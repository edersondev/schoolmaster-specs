get:
  tags:
    - Attendance
  summary: List attendance records for the authenticated student
  operationId: listStudentAttendance
  parameters:
    - $ref: ../../components/parameters/schools/TenantContext.yaml
    - $ref: ../../components/parameters/academics/AcademicPeriodFilter.yaml
    - $ref: ../../components/parameters/common/Page.yaml
    - $ref: ../../components/parameters/common/PerPage.yaml
  responses:
    '200':
      description: Student attendance collection
      content:
        application/json:
          schema:
            allOf:
              - $ref: ../../components/schemas/common/PaginatedEnvelope.yaml
              - type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: ../../components/schemas/attendance/StudentAttendanceRecord.yaml
    '401':
      $ref: ../../components/responses/auth/Unauthorized.yaml
    '403':
      $ref: ../../components/responses/schools/TenantMismatch.yaml
    '422':
      $ref: ../../components/responses/common/ValidationError.yaml
