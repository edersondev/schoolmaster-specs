get:
  tags:
    - Teacher Content
  summary: Download assigned teacher content for the authenticated student
  operationId: downloadStudentTeacherContent
  x-system-administrator-master-access: true
  parameters:
    - $ref: ../../components/parameters/schools/TenantContext.yaml
    - $ref: ../../components/parameters/teacher-content/ContentItemId.yaml
  responses:
    '200':
      description: Authorized content file download
      content:
        application/octet-stream:
          schema:
            type: string
            format: binary
    '401':
      $ref: ../../components/responses/auth/Unauthorized.yaml
    '403':
      $ref: ../../components/responses/schools/TenantMismatch.yaml
    '404':
      $ref: ../../components/responses/common/NotFound.yaml
    '422':
      $ref: ../../components/responses/common/ValidationError.yaml
