get:
  tags:
    - Reports
  summary: List report requests for the resolved school
  operationId: listReports
  x-system-administrator-master-access: true
  parameters:
    - $ref: ../../components/parameters/schools/TenantContext.yaml
    - $ref: ../../components/parameters/common/Page.yaml
    - $ref: ../../components/parameters/common/PerPage.yaml
    - name: report_type
      in: query
      schema:
        $ref: ../../components/schemas/reports/ReportType.yaml
    - name: generation_status
      in: query
      schema:
        $ref: ../../components/schemas/reports/ReportGenerationStatus.yaml
    - name: report_source
      in: query
      schema:
        type: string
        enum:
          - built_in
          - custom
    - name: include_deleted
      in: query
      description: Include soft-deleted report runs. Defaults to false.
      schema:
        type: boolean
        default: false
  responses:
    '200':
      description: Report request collection
      content:
        application/json:
          schema:
            allOf:
              - $ref: ../../components/schemas/common/PaginatedEnvelope.yaml
              - type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: ../../components/schemas/reports/ReportRun.yaml
    '401':
      $ref: ../../components/responses/auth/Unauthorized.yaml
    '403':
      $ref: ../../components/responses/schools/TenantMismatch.yaml
    '404':
      $ref: ../../components/responses/common/NotFound.yaml
    '422':
      $ref: ../../components/responses/common/ValidationError.yaml
post:
  tags:
    - Reports
  summary: Request a tenant-scoped built-in or custom report
  operationId: requestReport
  x-system-administrator-master-access: true
  parameters:
    - $ref: ../../components/parameters/schools/TenantContext.yaml
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/reports/ReportRequest.yaml
  responses:
    '202':
      description: Report request accepted
      content:
        application/json:
          schema:
            allOf:
              - $ref: ../../components/schemas/common/SuccessEnvelope.yaml
              - type: object
                properties:
                  data:
                    $ref: ../../components/schemas/reports/ReportRun.yaml
    '401':
      $ref: ../../components/responses/auth/Unauthorized.yaml
    '403':
      $ref: ../../components/responses/schools/TenantMismatch.yaml
    '404':
      $ref: ../../components/responses/common/NotFound.yaml
    '409':
      $ref: ../../components/responses/common/Conflict.yaml
    '422':
      $ref: ../../components/responses/common/ValidationError.yaml
