get:
  tags:
    - Reports
  summary: Download a generated report output
  operationId: downloadReport
  parameters:
    - $ref: ../../components/parameters/schools/TenantContext.yaml
    - $ref: ../../components/parameters/reports/ReportRunId.yaml
    - name: format
      in: query
      required: true
      schema:
        $ref: ../../components/schemas/reports/ReportFormat.yaml
  responses:
    '200':
      description: Generated report file download
      content:
        application/octet-stream:
          schema:
            type: string
            format: binary
    '401':
      $ref: ../../components/responses/auth/Unauthorized.yaml
    '403':
      $ref: ../../components/responses/schools/TenantMismatch.yaml
    '404':
      $ref: ../../components/responses/common/NotFound.yaml
    '410':
      $ref: ../../components/responses/common/OutputExpired.yaml
    '422':
      $ref: ../../components/responses/common/ValidationError.yaml
