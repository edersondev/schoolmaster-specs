post:
  tags:
    - Reports
  summary: Retry a failed or expired generated report run
  operationId: retryReport
  x-system-administrator-master-access: true
  parameters:
    - $ref: ../../components/parameters/schools/TenantContext.yaml
    - $ref: ../../components/parameters/reports/ReportRunId.yaml
  requestBody:
    required: false
    content:
      application/json:
        schema:
          type: object
          additionalProperties: false
          properties:
            reason_code:
              type: string
              enum:
                - retry_failed_generation
                - retry_expired_output
  responses:
    '202':
      description: Retry report request accepted
      content:
        application/json:
          schema:
            allOf:
              - $ref: ../../components/schemas/common/SuccessEnvelope.yaml
              - type: object
                properties:
                  data:
                    $ref: ../../components/schemas/reports/ReportRun.yaml
    '401':
      $ref: ../../components/responses/auth/Unauthorized.yaml
    '403':
      $ref: ../../components/responses/schools/TenantMismatch.yaml
    '404':
      $ref: ../../components/responses/common/NotFound.yaml
    '409':
      $ref: ../../components/responses/common/Conflict.yaml
    '422':
      $ref: ../../components/responses/common/ValidationError.yaml
