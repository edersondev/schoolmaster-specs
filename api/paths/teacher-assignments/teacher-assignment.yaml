get:
  tags:
    - Teacher Assignments
  summary: Get a teacher assignment
  description: >-
    School administrators can read same-school assignment details. Teachers can
    retrieve only their own active assignment detail.
  operationId: getTeacherAssignment
  x-system-administrator-master-access: true
  parameters:
    - $ref: ../../components/parameters/schools/TenantContext.yaml
    - $ref: ../../components/parameters/teacher-assignments/TeacherAssignmentId.yaml
  responses:
    '200':
      description: Teacher assignment detail visible to the actor
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/teacher-assignments/TeacherAssignmentEnvelope.yaml
    '401':
      $ref: ../../components/responses/auth/Unauthorized.yaml
    '403':
      $ref: ../../components/responses/classroom/ClassroomRosterForbidden.yaml
    '404':
      $ref: ../../components/responses/common/NotFound.yaml
