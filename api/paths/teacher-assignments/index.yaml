get:
  tags:
    - Teacher Assignments
  summary: List teacher assignments
  description: >-
    School administrators can list same-school teacher assignments. Teachers can
    list only their own active assignments. Supports pagination plus
    academicPeriodId and status filters only.
  operationId: listTeacherAssignments
  parameters:
    - $ref: ../../components/parameters/schools/TenantContext.yaml
    - $ref: ../../components/parameters/common/Page.yaml
    - $ref: ../../components/parameters/common/PerPage.yaml
    - $ref: ../../components/parameters/classroom/ClassroomRosterAcademicPeriodFilter.yaml
    - $ref: ../../components/parameters/teacher-assignments/TeacherAssignmentStatusFilter.yaml
  responses:
    '200':
      description: Paginated teacher assignments visible to the actor
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/teacher-assignments/TeacherAssignmentPaginatedEnvelope.yaml
    '401':
      $ref: ../../components/responses/auth/Unauthorized.yaml
    '403':
      $ref: ../../components/responses/classroom/ClassroomRosterForbidden.yaml
    '422':
      $ref: ../../components/responses/common/ValidationError.yaml
post:
  tags:
    - Teacher Assignments
  summary: Create a teacher assignment
  description: >-
    Assigns an active same-school teacher-compatible user to an active class
    section for an active compatible academic period. The teacher-compatible
    role must be active on the explicit effective start date. Duplicate active
    assignments are rejected.
  operationId: createTeacherAssignment
  parameters:
    - $ref: ../../components/parameters/schools/TenantContext.yaml
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/teacher-assignments/TeacherAssignmentCreateRequest.yaml
  responses:
    '201':
      description: Teacher assignment created
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/teacher-assignments/TeacherAssignmentEnvelope.yaml
    '401':
      $ref: ../../components/responses/auth/Unauthorized.yaml
    '403':
      $ref: ../../components/responses/classroom/ClassroomRosterForbidden.yaml
    '409':
      $ref: ../../components/responses/common/Conflict.yaml
    '422':
      $ref: ../../components/responses/common/ValidationError.yaml
