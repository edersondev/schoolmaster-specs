patch:
  tags:
    - Class Sections
  summary: Inactivate a class section
  description: >-
    Inactivates an active ClassSection/Roster only when no active roster
    memberships or active teacher assignments exist. A reason and today-or-past
    effective date inside the academic period are required. Reactivation is not
    supported in v1.
  operationId: updateClassSectionStatus
  parameters:
    - $ref: ../../components/parameters/schools/TenantContext.yaml
    - $ref: ../../components/parameters/classroom/ClassSectionId.yaml
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/classroom/ClassSectionStatusUpdateRequest.yaml
  responses:
    '200':
      description: Class section status updated
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/classroom/ClassSectionEnvelope.yaml
    '401':
      $ref: ../../components/responses/auth/Unauthorized.yaml
    '403':
      $ref: ../../components/responses/classroom/ClassroomRosterForbidden.yaml
    '404':
      $ref: ../../components/responses/common/NotFound.yaml
    '409':
      $ref: ../../components/responses/common/Conflict.yaml
    '422':
      $ref: ../../components/responses/common/ValidationError.yaml
