get:
  tags:
    - Class Sections
  summary: List school-owned class sections
  description: >-
    Returns only ClassSection/Roster records in the resolved active school
    context. Supports pagination plus academicPeriodId and status filters only;
    include expansion, sort behavior, and other filters are rejected.
  operationId: listClassSections
  parameters:
    - $ref: ../../components/parameters/schools/TenantContext.yaml
    - $ref: ../../components/parameters/common/Page.yaml
    - $ref: ../../components/parameters/common/PerPage.yaml
    - $ref: ../../components/parameters/classroom/ClassroomRosterAcademicPeriodFilter.yaml
    - $ref: ../../components/parameters/classroom/ClassSectionStatusFilter.yaml
  responses:
    '200':
      description: Paginated class sections visible in the resolved school context
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/classroom/ClassSectionPaginatedEnvelope.yaml
    '401':
      $ref: ../../components/responses/auth/Unauthorized.yaml
    '403':
      $ref: ../../components/responses/classroom/ClassroomRosterForbidden.yaml
    '422':
      $ref: ../../components/responses/common/ValidationError.yaml
post:
  tags:
    - Class Sections
  summary: Create a school-owned class section
  description: >-
    Creates an active ClassSection/Roster for the resolved school and active
    compatible academic period. Code is unique per school and academic period;
    names may repeat. Creation as inactive, unsupported metadata fields,
    cross-tenant references, and duplicate codes are rejected.
  operationId: createClassSection
  parameters:
    - $ref: ../../components/parameters/schools/TenantContext.yaml
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/classroom/ClassSectionCreateRequest.yaml
  responses:
    '201':
      description: Class section created as active
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/classroom/ClassSectionEnvelope.yaml
    '401':
      $ref: ../../components/responses/auth/Unauthorized.yaml
    '403':
      $ref: ../../components/responses/classroom/ClassroomRosterForbidden.yaml
    '409':
      $ref: ../../components/responses/common/Conflict.yaml
    '422':
      $ref: ../../components/responses/common/ValidationError.yaml
