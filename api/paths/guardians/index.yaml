get:
  tags:
    - Guardians
  summary: List guardians for a school
  operationId: listGuardians
  x-system-administrator-master-access: true
  parameters:
    - $ref: ../../components/parameters/schools/TenantContext.yaml
    - $ref: ../../components/parameters/common/Page.yaml
    - $ref: ../../components/parameters/common/PerPage.yaml
    - $ref: ../../components/parameters/common/StatusFilter.yaml
  responses:
    '200':
      description: Guardian collection
      content:
        application/json:
          schema:
            allOf:
              - $ref: ../../components/schemas/common/PaginatedEnvelope.yaml
              - type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: ../../components/schemas/guardians/Guardian.yaml
    '401':
      $ref: ../../components/responses/auth/Unauthorized.yaml
    '403':
      $ref: ../../components/responses/schools/TenantMismatch.yaml
post:
  tags:
    - Guardians
  summary: Create or maintain a guardian record
  operationId: createGuardian
  x-system-administrator-master-access: true
  parameters:
    - $ref: ../../components/parameters/schools/TenantContext.yaml
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/guardians/GuardianCreateRequest.yaml
  responses:
    '201':
      description: Guardian created
      content:
        application/json:
          schema:
            allOf:
              - $ref: ../../components/schemas/common/SuccessEnvelope.yaml
              - type: object
                properties:
                  data:
                    $ref: ../../components/schemas/guardians/Guardian.yaml
    '422':
      $ref: ../../components/responses/common/ValidationError.yaml
