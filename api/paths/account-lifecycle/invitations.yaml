post:
  tags:
    - Account Lifecycle
  summary: Create or replace an account invitation
  description: >-
    Creates a 7-day single-use invitation for an eligible platform or
    same-school user. The response never exposes reusable invitation token
    secrets. Creating a new invitation supersedes prior unused invitations for
    the same user and scope.
  operationId: createAccountInvitation
  parameters:
    - $ref: ../../components/parameters/schools/TenantContext.yaml
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/account-lifecycle/AccountInvitationCreateRequest.yaml
  responses:
    '201':
      description: Invitation created or replaced
      content:
        application/json:
          schema:
            allOf:
              - $ref: ../../components/schemas/common/SuccessEnvelope.yaml
              - type: object
                properties:
                  data:
                    $ref: ../../components/schemas/account-lifecycle/AccountInvitation.yaml
    '401':
      $ref: ../../components/responses/auth/Unauthorized.yaml
    '403':
      $ref: ../../components/responses/account-lifecycle/AccountLifecycleForbidden.yaml
    '409':
      $ref: ../../components/responses/common/Conflict.yaml
    '422':
      $ref: ../../components/responses/common/ValidationError.yaml
