get:
  tags:
    - Reports
  summary: Retrieve the approved report catalog for the resolved school
  operationId: getReportCatalog
  parameters:
    - $ref: ../../components/parameters/schools/TenantContext.yaml
  responses:
    '200':
      description: Approved report catalog
      content:
        application/json:
          schema:
            allOf:
              - $ref: ../../components/schemas/common/SuccessEnvelope.yaml
              - type: object
                properties:
                  data:
                    $ref: ../../components/schemas/reports/ReportCatalog.yaml
    '401':
      $ref: ../../components/responses/auth/Unauthorized.yaml
    '403':
      $ref: ../../components/responses/schools/TenantMismatch.yaml
    '422':
      $ref: ../../components/responses/common/ValidationError.yaml
