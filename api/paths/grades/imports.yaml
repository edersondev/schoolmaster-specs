post:
  tags:
    - Grades
  summary: Submit a create-only JSON grade import
  description: >-
    Only school administrators may import grades. Imports are limited to JSON
    payloads, a maximum of 500 rows, and all-or-nothing validation.
  operationId: importGrades
  parameters:
    - $ref: ../../components/parameters/schools/TenantContext.yaml
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/grades/GradeImportRequest.yaml
  responses:
    '201':
      description: Grade import run created with accepted outcome metadata
      content:
        application/json:
          schema:
            allOf:
              - $ref: ../../components/schemas/common/SuccessEnvelope.yaml
              - type: object
                properties:
                  data:
                    $ref: ../../components/schemas/reports/ImportRun.yaml
    '401':
      $ref: ../../components/responses/auth/Unauthorized.yaml
    '403':
      $ref: ../../components/responses/teacher-content/TeacherWorkflowForbidden.yaml
    '409':
      $ref: ../../components/responses/common/Conflict.yaml
    '422':
      $ref: ../../components/responses/common/ValidationError.yaml
