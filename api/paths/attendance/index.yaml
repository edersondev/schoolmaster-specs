get:
  tags:
    - Attendance
  summary: List attendance records in permitted scope
  operationId: listAttendance
  x-system-administrator-master-access: true
  parameters:
    - $ref: ../../components/parameters/schools/TenantContext.yaml
    - $ref: ../../components/parameters/common/Page.yaml
    - $ref: ../../components/parameters/common/PerPage.yaml
  responses:
    '200':
      description: Attendance record collection
      content:
        application/json:
          schema:
            allOf:
              - $ref: ../../components/schemas/common/PaginatedEnvelope.yaml
              - type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: ../../components/schemas/attendance/AttendanceRecord.yaml
    '401':
      $ref: ../../components/responses/auth/Unauthorized.yaml
    '403':
      $ref: ../../components/responses/teacher-content/TeacherWorkflowForbidden.yaml
    '422':
      $ref: ../../components/responses/common/ValidationError.yaml
post:
  tags:
    - Attendance
  summary: Record attendance for a student in an academic period
  operationId: createAttendance
  x-system-administrator-master-access: true
  parameters:
    - $ref: ../../components/parameters/schools/TenantContext.yaml
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/attendance/AttendanceCreateRequest.yaml
  responses:
    '201':
      description: Attendance record created
      content:
        application/json:
          schema:
            allOf:
              - $ref: ../../components/schemas/common/SuccessEnvelope.yaml
              - type: object
                properties:
                  data:
                    $ref: ../../components/schemas/attendance/AttendanceRecord.yaml
    '401':
      $ref: ../../components/responses/auth/Unauthorized.yaml
    '403':
      $ref: ../../components/responses/teacher-content/TeacherWorkflowForbidden.yaml
    '422':
      $ref: ../../components/responses/common/ValidationError.yaml
