patch:
  tags:
    - Attendance
  summary: Correct an attendance record with a required reason
  description: >-
    Preserves original values, current values, actor, timestamp, and correction
    history. Closed-period corrections are school-administrator-only.
  operationId: correctAttendance
  parameters:
    - $ref: ../../components/parameters/schools/TenantContext.yaml
    - $ref: ../../components/parameters/attendance/AttendanceId.yaml
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/attendance/AttendanceCorrectionRequest.yaml
  responses:
    '200':
      description: Attendance correction accepted
      content:
        application/json:
          schema:
            allOf:
              - $ref: ../../components/schemas/common/SuccessEnvelope.yaml
              - type: object
                properties:
                  data:
                    $ref: ../../components/schemas/attendance/AttendanceRecord.yaml
    '401':
      $ref: ../../components/responses/auth/Unauthorized.yaml
    '403':
      $ref: ../../components/responses/teacher-content/TeacherWorkflowForbidden.yaml
    '404':
      $ref: ../../components/responses/common/NotFound.yaml
    '409':
      $ref: ../../components/responses/common/Conflict.yaml
    '422':
      $ref: ../../components/responses/common/ValidationError.yaml
