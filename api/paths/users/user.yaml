get:
  tags:
    - Users
  summary: Retrieve a user in permitted scope
  operationId: getUser
  parameters:
    - $ref: ../../components/parameters/schools/TenantContext.yaml
    - $ref: ../../components/parameters/users/UserId.yaml
  responses:
    '200':
      description: User detail
      content:
        application/json:
          schema:
            allOf:
              - $ref: ../../components/schemas/common/SuccessEnvelope.yaml
              - type: object
                properties:
                  data:
                    $ref: ../../components/schemas/users/User.yaml
    '401':
      $ref: ../../components/responses/auth/Unauthorized.yaml
    '403':
      $ref: ../../components/responses/common/AdministrationForbidden.yaml
    '404':
      $ref: ../../components/responses/common/NotFound.yaml
patch:
  tags:
    - Users
  summary: Update documented user fields
  operationId: updateUser
  parameters:
    - $ref: ../../components/parameters/schools/TenantContext.yaml
    - $ref: ../../components/parameters/users/UserId.yaml
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/users/UserUpdateRequest.yaml
  responses:
    '200':
      description: User updated
      content:
        application/json:
          schema:
            allOf:
              - $ref: ../../components/schemas/common/SuccessEnvelope.yaml
              - type: object
                properties:
                  data:
                    $ref: ../../components/schemas/users/User.yaml
    '401':
      $ref: ../../components/responses/auth/Unauthorized.yaml
    '403':
      $ref: ../../components/responses/common/AdministrationForbidden.yaml
    '404':
      $ref: ../../components/responses/common/NotFound.yaml
    '409':
      $ref: ../../components/responses/common/Conflict.yaml
    '422':
      $ref: ../../components/responses/common/ValidationError.yaml
delete:
  tags:
    - Users
  summary: Soft delete a user
  operationId: deleteUser
  parameters:
    - $ref: ../../components/parameters/schools/TenantContext.yaml
    - $ref: ../../components/parameters/users/UserId.yaml
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/common/LifecycleActionRequest.yaml
  responses:
    '200':
      description: User soft deleted
      content:
        application/json:
          schema:
            allOf:
              - $ref: ../../components/schemas/common/SuccessEnvelope.yaml
              - type: object
                properties:
                  data:
                    $ref: ../../components/schemas/common/LifecycleOutcome.yaml
    '401':
      $ref: ../../components/responses/auth/Unauthorized.yaml
    '403':
      $ref: ../../components/responses/common/AdministrationForbidden.yaml
    '404':
      $ref: ../../components/responses/common/NotFound.yaml
    '409':
      $ref: ../../components/responses/common/Conflict.yaml
    '422':
      $ref: ../../components/responses/common/ValidationError.yaml
