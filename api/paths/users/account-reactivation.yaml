post:
  tags:
    - Account Lifecycle
  summary: Recover or reactivate an eligible account
  description: >-
    Reactivation validates user lifecycle state, school lifecycle state, active
    role assignments, password setup state, lock state, and tenant or platform
    scope before authentication may resume.
  operationId: reactivateAccount
  parameters:
    - $ref: ../../components/parameters/schools/TenantContext.yaml
    - $ref: ../../components/parameters/users/UserId.yaml
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/account-lifecycle/AccountRecoveryRequest.yaml
  responses:
    '200':
      description: Account recovery or reactivation completed
      content:
        application/json:
          schema:
            allOf:
              - $ref: ../../components/schemas/common/SuccessEnvelope.yaml
              - type: object
                properties:
                  data:
                    $ref: ../../components/schemas/account-lifecycle/AccountLifecycleResult.yaml
    '401':
      $ref: ../../components/responses/auth/Unauthorized.yaml
    '403':
      $ref: ../../components/responses/account-lifecycle/AccountLifecycleForbidden.yaml
    '404':
      $ref: ../../components/responses/common/NotFound.yaml
    '409':
      $ref: ../../components/responses/common/Conflict.yaml
    '422':
      $ref: ../../components/responses/common/ValidationError.yaml
