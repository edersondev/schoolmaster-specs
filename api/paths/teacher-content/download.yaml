get:
  tags:
    - Teacher Content
  summary: Request authorized download metadata for a teacher content item
  description: >-
    Download access requires clean scan status, same-school authority, and an
    allowed active lifecycle state. Successful and denied attempts are audited
    with tenant-safe metadata only.
  operationId: downloadTeacherContent
  parameters:
    - $ref: ../../components/parameters/schools/TenantContext.yaml
    - $ref: ../../components/parameters/teacher-content/ContentItemId.yaml
  responses:
    '200':
      description: Download metadata returned for authorized clean content
      content:
        application/json:
          schema:
            allOf:
              - $ref: ../../components/schemas/common/SuccessEnvelope.yaml
              - type: object
                properties:
                  data:
                    $ref: ../../components/schemas/teacher-content/TeacherContentDownloadResult.yaml
    '401':
      $ref: ../../components/responses/auth/Unauthorized.yaml
    '403':
      $ref: ../../components/responses/teacher-content/TeacherWorkflowForbidden.yaml
    '404':
      $ref: ../../components/responses/common/NotFound.yaml
    '409':
      $ref: ../../components/responses/common/Conflict.yaml
