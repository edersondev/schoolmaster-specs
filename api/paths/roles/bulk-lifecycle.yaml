post:
  tags:
    - Roles
  summary: Apply one lifecycle action to selected roles
  operationId: bulkLifecycleRoles
  parameters:
    - $ref: ../../components/parameters/schools/TenantContext.yaml
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/access/RoleBulkLifecycleActionRequest.yaml
  responses:
    '200':
      description: Bulk role lifecycle action completed
      content:
        application/json:
          schema:
            allOf:
              - $ref: ../../components/schemas/common/SuccessEnvelope.yaml
              - type: object
                properties:
                  data:
                    $ref: ../../components/schemas/common/BulkLifecycleOutcome.yaml
    '401':
      $ref: ../../components/responses/auth/Unauthorized.yaml
    '403':
      $ref: ../../components/responses/common/AdministrationForbidden.yaml
    '409':
      $ref: ../../components/responses/common/Conflict.yaml
    '422':
      $ref: ../../components/responses/common/ValidationError.yaml
