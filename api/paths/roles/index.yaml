get:
  tags:
    - Roles
  summary: List roles in permitted scope with inherited permissions
  operationId: listRoles
  x-system-administrator-master-access: true
  parameters:
    - $ref: ../../components/parameters/schools/TenantContext.yaml
    - $ref: ../../components/parameters/common/Page.yaml
    - $ref: ../../components/parameters/common/PerPage.yaml
    - $ref: ../../components/parameters/common/StatusFilter.yaml
  responses:
    '200':
      description: Role collection
      content:
        application/json:
          schema:
            allOf:
              - $ref: ../../components/schemas/common/PaginatedEnvelope.yaml
              - type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: ../../components/schemas/access/Role.yaml
    '401':
      $ref: ../../components/responses/auth/Unauthorized.yaml
    '403':
      $ref: ../../components/responses/schools/TenantMismatch.yaml
post:
  tags:
    - Roles
  summary: Create a scoped role
  operationId: createRole
  x-system-administrator-master-access: true
  parameters:
    - $ref: ../../components/parameters/schools/TenantContext.yaml
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/access/RoleCreateRequest.yaml
  responses:
    '201':
      description: Role created
      content:
        application/json:
          schema:
            allOf:
              - $ref: ../../components/schemas/common/SuccessEnvelope.yaml
              - type: object
                properties:
                  data:
                    $ref: ../../components/schemas/access/Role.yaml
    '422':
      $ref: ../../components/responses/common/ValidationError.yaml
