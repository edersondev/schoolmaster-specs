get:
  tags:
    - Academic Years
  summary: List academic years for a school
  operationId: listAcademicYears
  parameters:
    - $ref: ../../components/parameters/schools/TenantContext.yaml
    - $ref: ../../components/parameters/common/Page.yaml
    - $ref: ../../components/parameters/common/PerPage.yaml
    - $ref: ../../components/parameters/common/StatusFilter.yaml
  responses:
    '200':
      description: Academic year collection
      content:
        application/json:
          schema:
            allOf:
              - $ref: ../../components/schemas/common/PaginatedEnvelope.yaml
              - type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: ../../components/schemas/academics/AcademicYear.yaml
    '401':
      $ref: ../../components/responses/auth/Unauthorized.yaml
    '403':
      $ref: ../../components/responses/schools/TenantMismatch.yaml
post:
  tags:
    - Academic Years
  summary: Create an academic year for the resolved school
  operationId: createAcademicYear
  parameters:
    - $ref: ../../components/parameters/schools/TenantContext.yaml
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/academics/AcademicYearCreateRequest.yaml
  responses:
    '201':
      description: Academic year created
      content:
        application/json:
          schema:
            allOf:
              - $ref: ../../components/schemas/common/SuccessEnvelope.yaml
              - type: object
                properties:
                  data:
                    $ref: ../../components/schemas/academics/AcademicYear.yaml
    '422':
      $ref: ../../components/responses/common/ValidationError.yaml
