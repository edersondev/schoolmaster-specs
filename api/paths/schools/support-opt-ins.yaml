post:
  tags:
    - Platform Support
  summary: Create a target-school support opt-in
  operationId: createSchoolSupportOptIn
  parameters:
    - name: schoolId
      in: path
      required: true
      schema:
        type: string
        format: uuid
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/platform-support/support-opt-in.yaml#/CreateSchoolSupportOptInRequest
  responses:
    '201':
      description: Target-school support opt-in approved for a maximum 24-hour window.
      content:
        application/json:
          schema:
            allOf:
              - $ref: ../../components/schemas/common/SuccessEnvelope.yaml
              - type: object
                properties:
                  data:
                    $ref: ../../components/schemas/platform-support/support-opt-in.yaml#/SchoolSupportOptIn
    '401':
      $ref: ../../components/responses/auth/Unauthorized.yaml
    '403':
      $ref: ../../components/responses/common/Forbidden.yaml
    '404':
      $ref: ../../components/responses/common/NotFound.yaml
    '409':
      $ref: ../../components/responses/common/Conflict.yaml
    '422':
      $ref: ../../components/responses/common/ValidationError.yaml
x-operation-coverage:
  revokeSchoolSupportOptIn:
    $ref: support-opt-in-revoke.yaml
