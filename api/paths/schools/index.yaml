get:
  tags:
    - Schools
  summary: List schools visible to the requester
  operationId: listSchools
  parameters:
    - $ref: ../../components/parameters/common/Page.yaml
    - $ref: ../../components/parameters/common/PerPage.yaml
    - $ref: ../../components/parameters/common/Sort.yaml
    - $ref: ../../components/parameters/schools/SchoolStatusFilter.yaml
    - $ref: ../../components/parameters/schools/SchoolInepCodeFilter.yaml
    - $ref: ../../components/parameters/schools/SchoolDocumentFilter.yaml
    - $ref: ../../components/parameters/schools/SchoolNameFilter.yaml
    - $ref: ../../components/parameters/schools/SchoolEmailFilter.yaml
    - $ref: ../../components/parameters/schools/SchoolCityFilter.yaml
    - $ref: ../../components/parameters/schools/SchoolStateFilter.yaml
    - $ref: ../../components/parameters/schools/SchoolAdministrativeTypeFilter.yaml
    - $ref: ../../components/parameters/schools/SchoolLegalNatureFilter.yaml
    - $ref: ../../components/parameters/schools/SchoolManagementTypeFilter.yaml
    - $ref: ../../components/parameters/schools/SchoolPedagogicalApproachFilter.yaml
  responses:
    '200':
      description: School collection
      content:
        application/json:
          schema:
            allOf:
              - $ref: ../../components/schemas/common/PaginatedEnvelope.yaml
              - type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: ../../components/schemas/schools/School.yaml
    '401':
      $ref: ../../components/responses/auth/Unauthorized.yaml
    '403':
      $ref: ../../components/responses/common/Forbidden.yaml
    '422':
      $ref: ../../components/responses/common/ValidationError.yaml
post:
  tags:
    - Schools
  summary: Create a school tenant with Basic, Address, Institutional, and Branding fields
  description: >
    Accepts JSON for no-logo creation and multipart/form-data when logo_file is
    submitted. Legacy cnpj fields are rejected; document is the canonical CNPJ
    payload field. INEP code, document, and email uniqueness checks include
    inactive and soft-deleted schools, with email compared case-insensitively.
  operationId: createSchool
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/schools/SchoolCreateRequest.yaml
      multipart/form-data:
        schema:
          $ref: ../../components/schemas/schools/SchoolCreateRequest.yaml
  responses:
    '201':
      description: School created
      content:
        application/json:
          schema:
            allOf:
              - $ref: ../../components/schemas/common/SuccessEnvelope.yaml
              - type: object
                properties:
                  data:
                    $ref: ../../components/schemas/schools/School.yaml
    '401':
      $ref: ../../components/responses/auth/Unauthorized.yaml
    '403':
      $ref: ../../components/responses/common/Forbidden.yaml
    '422':
      $ref: ../../components/responses/common/ValidationError.yaml
