post:
  tags:
    - Platform Support
  summary: Revoke a target-school support opt-in
  operationId: revokeSchoolSupportOptIn
  parameters:
    - name: schoolId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    - name: supportOptInId
      in: path
      required: true
      schema:
        type: string
        format: uuid
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/platform-support/support-opt-in.yaml#/RevokeSchoolSupportOptInRequest
  responses:
    '200':
      description: Target-school support opt-in revoked.
      content:
        application/json:
          schema:
            allOf:
              - $ref: ../../components/schemas/common/SuccessEnvelope.yaml
              - type: object
                properties:
                  data:
                    $ref: ../../components/schemas/platform-support/support-opt-in.yaml#/SchoolSupportOptIn
    '401':
      $ref: ../../components/responses/auth/Unauthorized.yaml
    '403':
      $ref: ../../components/responses/common/Forbidden.yaml
    '404':
      $ref: ../../components/responses/common/NotFound.yaml
    '409':
      $ref: ../../components/responses/common/Conflict.yaml
    '422':
      $ref: ../../components/responses/common/ValidationError.yaml
