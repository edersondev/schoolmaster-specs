get:
  tags:
    - Guardian Self-Service
  summary: Retrieve guardian-visible contact information
  description: >-
    Returns only the authenticated guardian's own contact fields,
    school-approved relationship label, and the student's primary
    school-approved contact details. Other guardian records, non-primary
    contacts, emergency handling details, and school-only notes are hidden.
  operationId: getGuardianStudentContacts
  x-system-administrator-master-access: true
  parameters:
    - $ref: ../../../components/parameters/schools/TenantContext.yaml
    - $ref: ../../../components/parameters/student-profiles/StudentProfileId.yaml
  responses:
    '200':
      description: Guardian-visible contact view
      content:
        application/json:
          schema:
            allOf:
              - $ref: ../../../components/schemas/common/SuccessEnvelope.yaml
              - type: object
                properties:
                  data:
                    $ref: ../../../components/schemas/guardians/GuardianContactView.yaml
    '401':
      $ref: ../../../components/responses/auth/Unauthorized.yaml
    '403':
      $ref: ../../../components/responses/schools/TenantMismatch.yaml
    '404':
      $ref: ../../../components/responses/common/NotFound.yaml
    '422':
      $ref: ../../../components/responses/common/ValidationError.yaml
