get:
  tags:
    - Guardian Self-Service
  summary: Retrieve guardian-visible academic summary
  description: >-
    Returns summary-only academic information for one permitted student and one
    explicit same-school academic period. Detailed grade rows, attendance rows,
    correction history, teacher content, questionnaire answers, and reports are
    not exposed.
  operationId: getGuardianStudentAcademics
  x-system-administrator-master-access: true
  parameters:
    - $ref: ../../../components/parameters/schools/TenantContext.yaml
    - $ref: ../../../components/parameters/student-profiles/StudentProfileId.yaml
    - $ref: ../../../components/parameters/academics/AcademicPeriodFilterRequired.yaml
  responses:
    '200':
      description: Guardian-visible academic summary
      content:
        application/json:
          schema:
            allOf:
              - $ref: ../../../components/schemas/common/SuccessEnvelope.yaml
              - type: object
                properties:
                  data:
                    $ref: ../../../components/schemas/guardians/GuardianAcademicSummary.yaml
    '401':
      $ref: ../../../components/responses/auth/Unauthorized.yaml
    '403':
      $ref: ../../../components/responses/schools/TenantMismatch.yaml
    '404':
      $ref: ../../../components/responses/common/NotFound.yaml
    '422':
      $ref: ../../../components/responses/common/ValidationError.yaml
