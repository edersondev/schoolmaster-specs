get:
  tags:
    - Guardian Self-Service
  summary: List students visible to the authenticated guardian
  description: >-
    Returns only active same-school student profiles associated with the
    authenticated guardian through an active guardian-user link and active
    school-approved guardian-student association.
  operationId: listGuardianStudents
  parameters:
    - $ref: ../../../components/parameters/schools/TenantContext.yaml
    - $ref: ../../../components/parameters/common/Page.yaml
    - $ref: ../../../components/parameters/common/PerPage.yaml
  responses:
    '200':
      description: Guardian-visible student collection
      content:
        application/json:
          schema:
            allOf:
              - $ref: ../../../components/schemas/common/PaginatedEnvelope.yaml
              - type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: ../../../components/schemas/guardians/GuardianStudentSummary.yaml
    '401':
      $ref: ../../../components/responses/auth/Unauthorized.yaml
    '403':
      $ref: ../../../components/responses/schools/TenantMismatch.yaml
    '422':
      $ref: ../../../components/responses/common/ValidationError.yaml
