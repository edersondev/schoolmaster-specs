get:
  tags:
    - Guardian Self-Service
  summary: Retrieve a guardian-visible student summary
  description: >-
    Returns the limited profile and enrollment summary for a permitted active
    student. Missing, unassociated, inactive, or cross-tenant target students
    return the same not-found envelope.
  operationId: getGuardianStudent
  x-system-administrator-master-access: true
  parameters:
    - $ref: ../../../components/parameters/schools/TenantContext.yaml
    - $ref: ../../../components/parameters/student-profiles/StudentProfileId.yaml
  responses:
    '200':
      description: Guardian-visible student detail
      content:
        application/json:
          schema:
            allOf:
              - $ref: ../../../components/schemas/common/SuccessEnvelope.yaml
              - type: object
                properties:
                  data:
                    $ref: ../../../components/schemas/guardians/GuardianStudentDetail.yaml
    '401':
      $ref: ../../../components/responses/auth/Unauthorized.yaml
    '403':
      $ref: ../../../components/responses/schools/TenantMismatch.yaml
    '404':
      $ref: ../../../components/responses/common/NotFound.yaml
    '422':
      $ref: ../../../components/responses/common/ValidationError.yaml
