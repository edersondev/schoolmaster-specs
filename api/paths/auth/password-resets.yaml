post:
  tags:
    - Account Lifecycle
  summary: Complete password reset
  description: >-
    Completes credential replacement with a valid unexpired single-use reset
    token. Successful completion revokes all active bearer tokens for the
    affected user.
  operationId: completePasswordReset
  security: []
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/account-lifecycle/PasswordResetCompletionRequest.yaml
  responses:
    '200':
      description: Password reset completed
      content:
        application/json:
          schema:
            allOf:
              - $ref: ../../components/schemas/common/SuccessEnvelope.yaml
              - type: object
                properties:
                  data:
                    $ref: ../../components/schemas/account-lifecycle/AccountLifecycleResult.yaml
    '401':
      $ref: ../../components/responses/auth/TokenInvalid.yaml
    '409':
      $ref: ../../components/responses/common/Conflict.yaml
    '422':
      $ref: ../../components/responses/common/ValidationError.yaml
