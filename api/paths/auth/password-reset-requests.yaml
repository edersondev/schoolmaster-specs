post:
  tags:
    - Account Lifecycle
  summary: Request password reset with non-enumerating response
  description: >-
    Always returns the same accepted envelope for eligible, missing, inactive,
    locked, deleted, unauthorized, and over-limit identifiers. Requests beyond 3
    per account or IP within 1 hour create no reset token and no email delivery
    request.
  operationId: requestPasswordReset
  security: []
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/account-lifecycle/PasswordResetRequestCreateRequest.yaml
  responses:
    '202':
      description: Reset request accepted without revealing account state
      content:
        application/json:
          schema:
            allOf:
              - $ref: ../../components/schemas/common/SuccessEnvelope.yaml
              - type: object
                properties:
                  data:
                    $ref: ../../components/schemas/account-lifecycle/PasswordResetRequestResult.yaml
    '422':
      $ref: ../../components/responses/common/ValidationError.yaml
