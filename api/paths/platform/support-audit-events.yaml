get:
  tags:
    - Platform Support
  summary: List minimized platform support audit events
  operationId: listSupportAuditEvents
  parameters:
    - $ref: ../../components/parameters/common/Page.yaml
    - $ref: ../../components/parameters/common/PerPage.yaml
    - name: action
      in: query
      schema:
        $ref: ../../components/schemas/platform-support/audit.yaml#/PlatformSupportAuditAction
    - name: outcome
      in: query
      schema:
        $ref: ../../components/schemas/platform-support/audit.yaml#/PlatformSupportAuditOutcome
    - name: school_id
      in: query
      schema:
        type: string
        format: uuid
    - name: correlation_id
      in: query
      schema:
        type: string
  responses:
    '200':
      description: Minimized platform support audit event collection.
      content:
        application/json:
          schema:
            allOf:
              - $ref: ../../components/schemas/common/PaginatedEnvelope.yaml
              - type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: ../../components/schemas/platform-support/audit.yaml#/PlatformSupportAuditEvent
    '401':
      $ref: ../../components/responses/auth/Unauthorized.yaml
    '403':
      $ref: ../../components/responses/common/Forbidden.yaml
    '422':
      $ref: ../../components/responses/common/ValidationError.yaml
