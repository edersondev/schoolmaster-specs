post:
  tags:
    - Platform Support
  summary: Approve a target-school support access decision internally
  operationId: approveSupportAccess
  parameters:
    - name: supportAccessId
      in: path
      required: true
      schema:
        type: string
        format: uuid
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../../../components/schemas/platform-support/support-access-decision.yaml#/ApproveSupportAccessRequest
  responses:
    '200':
      description: Internal platform approval recorded for the support access decision.
      content:
        application/json:
          schema:
            allOf:
              - $ref: ../../../components/schemas/common/SuccessEnvelope.yaml
              - type: object
                properties:
                  data:
                    $ref: ../../../components/schemas/platform-support/support-access-decision.yaml#/SupportAccessDecision
    '401':
      $ref: ../../../components/responses/auth/Unauthorized.yaml
    '403':
      $ref: ../../../components/responses/common/Forbidden.yaml
    '404':
      $ref: ../../../components/responses/common/NotFound.yaml
    '409':
      $ref: ../../../components/responses/common/Conflict.yaml
    '422':
      $ref: ../../../components/responses/common/ValidationError.yaml
