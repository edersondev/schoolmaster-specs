get:
  tags:
    - Platform Support
  summary: List minimized platform school operational summaries
  operationId: listPlatformSchoolSummaries
  parameters:
    - $ref: ../../components/parameters/common/Page.yaml
    - $ref: ../../components/parameters/common/PerPage.yaml
    - name: status
      in: query
      schema:
        type: string
        enum:
          - active
          - inactive
          - suspended
    - name: sort
      in: query
      description: Comma-separated field names. Allowed values are name, status, and created_at. Prefix with '-' for descending.
      schema:
        type: string
  responses:
    '200':
      description: Minimized platform school summary collection with protected counts below 5 suppressed.
      content:
        application/json:
          schema:
            allOf:
              - $ref: ../../components/schemas/common/PaginatedEnvelope.yaml
              - type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: ../../components/schemas/platform-support/platform-summaries.yaml#/PlatformSchoolSummary
    '401':
      $ref: ../../components/responses/auth/Unauthorized.yaml
    '403':
      $ref: ../../components/responses/common/Forbidden.yaml
    '422':
      $ref: ../../components/responses/common/ValidationError.yaml
