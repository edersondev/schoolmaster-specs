get:
  tags:
    - Platform Support
  summary: Get redacted read-only support diagnostics for one school
  operationId: getSupportSchoolDiagnostics
  parameters:
    - name: schoolId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    - name: support_access_id
      in: query
      required: true
      schema:
        type: string
        format: uuid
    - name: reason_code
      in: query
      required: true
      schema:
        type: string
    - name: correlation_id
      in: query
      required: true
      schema:
        type: string
  responses:
    '200':
      description: Redacted diagnostics returned after both target-school opt-in and internal platform approval are valid and no older than 24 hours.
      content:
        application/json:
          schema:
            allOf:
              - $ref: ../../components/schemas/common/SuccessEnvelope.yaml
              - type: object
                properties:
                  data:
                    $ref: ../../components/schemas/platform-support/platform-summaries.yaml#/SupportDiagnosticView
    '401':
      $ref: ../../components/responses/auth/Unauthorized.yaml
    '403':
      $ref: ../../components/responses/common/Forbidden.yaml
    '404':
      $ref: ../../components/responses/common/NotFound.yaml
    '409':
      $ref: ../../components/responses/common/Conflict.yaml
    '422':
      $ref: ../../components/responses/common/ValidationError.yaml
