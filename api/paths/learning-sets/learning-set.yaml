get:
  tags:
    - Learning Sets
  summary: Retrieve a tenant-scoped learning set
  operationId: getLearningSet
  x-system-administrator-master-access: true
  parameters:
    - $ref: ../../components/parameters/schools/TenantContext.yaml
    - $ref: ../../components/parameters/learning-sets/LearningSetId.yaml
  responses:
    '200':
      description: Learning set detail
      content:
        application/json:
          schema:
            allOf:
              - $ref: ../../components/schemas/common/SuccessEnvelope.yaml
              - type: object
                properties:
                  data:
                    $ref: ../../components/schemas/learning-sets/LearningSet.yaml
    '401':
      $ref: ../../components/responses/auth/Unauthorized.yaml
    '403':
      $ref: ../../components/responses/teacher-content/TeacherWorkflowForbidden.yaml
    '404':
      $ref: ../../components/responses/common/NotFound.yaml
patch:
  tags:
    - Learning Sets
  summary: Update editable learning-set fields
  description: >-
    New writes use roster-aware assignment scope. Legacy direct selected-student
    assignments remain readable only where already present.
  operationId: updateLearningSet
  x-system-administrator-master-access: true
  parameters:
    - $ref: ../../components/parameters/schools/TenantContext.yaml
    - $ref: ../../components/parameters/learning-sets/LearningSetId.yaml
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/learning-sets/LearningSetUpdateRequest.yaml
  responses:
    '200':
      description: Learning set updated
      content:
        application/json:
          schema:
            allOf:
              - $ref: ../../components/schemas/common/SuccessEnvelope.yaml
              - type: object
                properties:
                  data:
                    $ref: ../../components/schemas/learning-sets/LearningSet.yaml
    '401':
      $ref: ../../components/responses/auth/Unauthorized.yaml
    '403':
      $ref: ../../components/responses/teacher-content/TeacherWorkflowForbidden.yaml
    '404':
      $ref: ../../components/responses/common/NotFound.yaml
    '409':
      $ref: ../../components/responses/common/Conflict.yaml
    '422':
      $ref: ../../components/responses/common/ValidationError.yaml
delete:
  tags:
    - Learning Sets
  summary: Soft-delete a learning set
  operationId: deleteLearningSet
  x-system-administrator-master-access: true
  parameters:
    - $ref: ../../components/parameters/schools/TenantContext.yaml
    - $ref: ../../components/parameters/learning-sets/LearningSetId.yaml
  responses:
    '200':
      description: Learning set moved to deleted state
      content:
        application/json:
          schema:
            allOf:
              - $ref: ../../components/schemas/common/SuccessEnvelope.yaml
              - type: object
                properties:
                  data:
                    $ref: ../../components/schemas/learning-sets/LearningSet.yaml
    '401':
      $ref: ../../components/responses/auth/Unauthorized.yaml
    '403':
      $ref: ../../components/responses/teacher-content/TeacherWorkflowForbidden.yaml
    '404':
      $ref: ../../components/responses/common/NotFound.yaml
    '409':
      $ref: ../../components/responses/common/Conflict.yaml
