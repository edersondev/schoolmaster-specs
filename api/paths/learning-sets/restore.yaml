post:
  tags:
    - Learning Sets
  summary: Restore a deleted learning set
  operationId: restoreLearningSet
  parameters:
    - $ref: ../../components/parameters/schools/TenantContext.yaml
    - $ref: ../../components/parameters/learning-sets/LearningSetId.yaml
  requestBody:
    required: false
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/teacher-content/TeacherWorkflowRestoreRequest.yaml
  responses:
    '200':
      description: Learning set restored to inactive
      content:
        application/json:
          schema:
            allOf:
              - $ref: ../../components/schemas/common/SuccessEnvelope.yaml
              - type: object
                properties:
                  data:
                    $ref: ../../components/schemas/learning-sets/LearningSet.yaml
    '401':
      $ref: ../../components/responses/auth/Unauthorized.yaml
    '403':
      $ref: ../../components/responses/teacher-content/TeacherWorkflowForbidden.yaml
    '404':
      $ref: ../../components/responses/common/NotFound.yaml
    '409':
      $ref: ../../components/responses/common/Conflict.yaml
