get:
  tags:
    - Student Profiles
  summary: List student profiles in the resolved school context
  operationId: listStudentProfiles
  x-system-administrator-master-access: true
  parameters:
    - $ref: ../../components/parameters/schools/TenantContext.yaml
    - $ref: ../../components/parameters/common/Page.yaml
    - $ref: ../../components/parameters/common/PerPage.yaml
    - $ref: ../../components/parameters/student-profiles/StudentProfileStatusFilter.yaml
    - $ref: ../../components/parameters/student-profiles/StudentProfileSearch.yaml
    - $ref: ../../components/parameters/student-profiles/StudentProfileSort.yaml
  responses:
    '200':
      description: Student profile collection
      content:
        application/json:
          schema:
            allOf:
              - $ref: ../../components/schemas/common/PaginatedEnvelope.yaml
              - type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: ../../components/schemas/student-profiles/StudentProfileSummary.yaml
    '401':
      $ref: ../../components/responses/auth/Unauthorized.yaml
    '403':
      $ref: ../../components/responses/student-profiles/StudentProfileForbidden.yaml
    '422':
      $ref: ../../components/responses/common/ValidationError.yaml
post:
  tags:
    - Student Profiles
  summary: Create a same-school student profile
  operationId: createStudentProfile
  x-system-administrator-master-access: true
  parameters:
    - $ref: ../../components/parameters/schools/TenantContext.yaml
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/student-profiles/StudentProfileCreateRequest.yaml
  responses:
    '201':
      description: Student profile created
      content:
        application/json:
          schema:
            allOf:
              - $ref: ../../components/schemas/common/SuccessEnvelope.yaml
              - type: object
                properties:
                  data:
                    $ref: ../../components/schemas/student-profiles/StudentProfile.yaml
    '401':
      $ref: ../../components/responses/auth/Unauthorized.yaml
    '403':
      $ref: ../../components/responses/student-profiles/StudentProfileForbidden.yaml
    '409':
      $ref: ../../components/responses/common/Conflict.yaml
    '422':
      $ref: ../../components/responses/common/ValidationError.yaml
