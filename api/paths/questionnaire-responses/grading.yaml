post:
  tags:
    - Assessment Responses
  summary: Grade advanced questionnaire response answers
  operationId: gradeQuestionnaireResponse
  x-system-administrator-master-access: true
  parameters:
    - $ref: ../../components/parameters/schools/TenantContext.yaml
    - name: responseAttemptId
      in: path
      required: true
      schema:
        type: string
        format: uuid
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/assessments/AssessmentResponseAttempt.yaml#/$defs/GradeAssessmentResponseRequest
  responses:
    '200':
      description: Grading outcomes recorded
      content:
        application/json:
          schema:
            allOf:
              - $ref: ../../components/schemas/common/SuccessEnvelope.yaml
              - type: object
                properties:
                  data:
                    $ref: ../../components/schemas/assessments/AssessmentResponseAttempt.yaml
    '401':
      $ref: ../../components/responses/auth/Unauthorized.yaml
    '403':
      $ref: ../../components/responses/assessments/AssessmentResponses.yaml#/AssessmentForbidden
    '404':
      $ref: ../../components/responses/common/NotFound.yaml
    '409':
      $ref: ../../components/responses/common/Conflict.yaml
    '422':
      $ref: ../../components/responses/assessments/AssessmentResponses.yaml#/AssessmentValidation
