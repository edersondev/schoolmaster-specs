allOf:
  - $ref: StudentProfileSummary.yaml
  - type: object
    required:
      - guardian_associations
      - enrollment_history
    properties:
      date_of_birth:
        type:
          - string
          - 'null'
        format: date
      contact_email:
        type:
          - string
          - 'null'
        format: email
      contact_phone:
        type:
          - string
          - 'null'
      current_academic_year_id:
        type:
          - string
          - 'null'
        format: uuid
      guardian_associations:
        type: array
        items:
          $ref: ../guardians/Guardian.yaml
      enrollment_history:
        type: array
        items:
          $ref: EnrollmentHistory.yaml
