type: object
required:
  - id
  - school_id
  - student_profile_id
  - event_type
  - to_status
  - effective_at
  - reason
  - actor_user_id
  - created_at
properties:
  id:
    type: string
    format: uuid
  school_id:
    type: string
    format: uuid
  student_profile_id:
    type: string
    format: uuid
  event_type:
    type: string
    enum:
      - created
      - activated
      - inactivated
      - transferred_out
      - destination_profile_linked
  from_status:
    type:
      - string
      - 'null'
    enum:
      - active
      - inactive
      - transferred
      - null
  to_status:
    $ref: StudentProfileStatus.yaml
  effective_at:
    type: string
    format: date
  reason:
    type: string
  actor_user_id:
    type: string
    format: uuid
  metadata_summary:
    type: object
    additionalProperties: true
  created_at:
    type: string
    format: date-time
