type: object
additionalProperties: false
required:
  - academic_period_id
  - effective_start_date
  - student_profile_ids
properties:
  academic_period_id:
    type: string
    format: uuid
  effective_start_date:
    type: string
    format: date
    description: >-
      Required explicit start date. Must be today-or-past in the resolved school
      timezone and inside the academic period.
  student_profile_ids:
    type: array
    minItems: 1
    maxItems: 100
    uniqueItems: true
    items:
      type: string
      format: uuid
