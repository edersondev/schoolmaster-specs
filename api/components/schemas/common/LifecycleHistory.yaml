type: object
required:
  - id
  - resource_type
  - resource_id
  - operation
  - effective_at
  - reason
  - actor_user_id
  - created_at
properties:
  id:
    type: string
    format: uuid
  school_id:
    type:
      - string
      - 'null'
    format: uuid
  resource_type:
    type: string
  resource_id:
    type: string
    format: uuid
  operation:
    type: string
    enum:
      - updated
      - activated
      - deactivated
      - deleted
      - restored
      - bulk_lifecycle
  from_status:
    type:
      - string
      - 'null'
  to_status:
    type:
      - string
      - 'null'
  effective_at:
    type: string
    format: date
  reason:
    type: string
  actor_user_id:
    type: string
    format: uuid
  metadata_summary:
    type: object
    additionalProperties: true
  created_at:
    type: string
    format: date-time
