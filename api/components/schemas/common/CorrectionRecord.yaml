type: object
required:
  - id
  - school_id
  - target_record_type
  - target_record_id
  - actor_user_id
  - correction_reason
  - corrected_at
properties:
  id:
    type: string
    format: uuid
  school_id:
    type: string
    format: uuid
  target_record_type:
    type: string
    enum:
      - grade
      - attendance
  target_record_id:
    type: string
    format: uuid
  actor_user_id:
    type: string
    format: uuid
  correction_reason:
    type: string
    minLength: 10
    maxLength: 500
  corrected_at:
    type: string
    format: date-time
