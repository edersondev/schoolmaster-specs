type: object
required:
  - id
  - scope
  - name
  - status
  - permissions
properties:
  id:
    type: string
    format: uuid
  school_id:
    type:
      - string
      - 'null'
    format: uuid
  scope:
    $ref: Scope.yaml
  name:
    type: string
  status:
    $ref: ../common/Status.yaml
  permissions:
    type: array
    items:
      $ref: Permission.yaml
