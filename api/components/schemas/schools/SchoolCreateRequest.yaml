type: object
additionalProperties: false
required:
  - name
  - cnpj
properties:
  name:
    type: string
  cnpj:
    type: string
    pattern: '^[0-9]{14}$'
    description: Required unique Brazilian CNPJ without mask; must pass check-digit validation.
  contact_email:
    type: string
    format: email
  contact_phone:
    type: string
  address:
    oneOf:
      - $ref: ../addresses/AddressInput.yaml
      - type: 'null'
