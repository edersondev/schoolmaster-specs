type: object
additionalProperties: false
required:
  - inep_code
  - status
  - name
  - document
  - email
  - address
  - administrative_type_id
  - legal_nature_id
  - management_type_id
  - pedagogical_approach_id
  - education_level_ids
  - modality_ids
properties:
  inep_code:
    type: string
    pattern: '^[0-9]{8}$'
    description: Required unique INEP school code. Uniqueness includes inactive and soft-deleted schools.
  status:
    type: integer
    enum:
      - 1
      - 0
  name:
    type: string
    maxLength: 255
  trade_name:
    type:
      - string
      - 'null'
    maxLength: 255
  legal_name:
    type:
      - string
      - 'null'
    maxLength: 255
  document:
    type: string
    pattern: '^[0-9]{14}$'
    description: Required unique Brazilian CNPJ digits with valid check digits. Legacy cnpj payloads are rejected.
  email:
    type: string
    format: email
    maxLength: 100
    description: Required unique school email. Uniqueness is case-insensitive and includes inactive and soft-deleted schools.
  phone:
    type:
      - string
      - 'null'
    pattern: '^[0-9]*$'
  website:
    type:
      - string
      - 'null'
    format: uri
    maxLength: 100
  description:
    type:
      - string
      - 'null'
    maxLength: 500
  address:
    $ref: ../addresses/AddressInput.yaml
  administrative_type_id:
    type: integer
  legal_nature_id:
    type: integer
  management_type_id:
    type: integer
  pedagogical_approach_id:
    type: integer
  education_level_ids:
    type: array
    minItems: 1
    items:
      type: integer
  modality_ids:
    type: array
    minItems: 1
    items:
      type: integer
  timezone:
    type: string
    default: America/Sao_Paulo
  language:
    type: string
    default: pt-BR
  primary_color:
    type: string
    pattern: '^#[0-9A-Fa-f]{6}$'
    default: '#1D4ED8'
  secondary_color:
    type: string
    pattern: '^#[0-9A-Fa-f]{6}$'
    default: '#F59E0B'
  logo_file:
    type: string
    format: binary
    description: Optional PNG, JPEG, or WebP logo file up to 2 MB. Only valid in multipart/form-data requests.
