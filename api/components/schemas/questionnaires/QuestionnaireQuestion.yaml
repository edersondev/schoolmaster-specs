type: object
required:
  - id
  - question_type
  - prompt
  - sequence
properties:
  id:
    type: string
    format: uuid
  question_type:
    $ref: QuestionType.yaml
  prompt:
    type: string
  options:
    type:
      - array
      - 'null'
    items:
      type: string
  correct_answer:
    type:
      - string
      - 'null'
    description: Hidden from student and report responses unless an existing v1 authoring response documents it.
  sequence:
    type: integer
  answer_schema:
    type:
      - object
      - 'null'
    additionalProperties: true
  grading_rule:
    type:
      - object
      - 'null'
    additionalProperties: true
  visibility:
    type:
      - object
      - 'null'
    additionalProperties: true
