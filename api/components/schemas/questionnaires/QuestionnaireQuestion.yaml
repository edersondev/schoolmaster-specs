type: object
required:
  - id
  - question_type
  - prompt
  - sequence
properties:
  id:
    type: string
    format: uuid
  question_type:
    $ref: QuestionType.yaml
  prompt:
    type: string
  options:
    type:
      - array
      - 'null'
    items:
      type: string
  correct_answer:
    type:
      - string
      - 'null'
  sequence:
    type: integer
