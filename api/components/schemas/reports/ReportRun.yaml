type: object
required:
  - id
  - school_id
  - requested_by_user_id
  - report_type
  - filter_summary
  - output_formats
  - generation_status
  - outputs
  - outputs_available
properties:
  id:
    type: string
    format: uuid
  school_id:
    type: string
    format: uuid
  requested_by_user_id:
    type: string
    format: uuid
  report_type:
    $ref: ReportType.yaml
  filter_summary:
    $ref: ReportFilters.yaml
  output_formats:
    type: array
    minItems: 1
    items:
      $ref: ReportFormat.yaml
  generation_status:
    $ref: ReportGenerationStatus.yaml
  status:
    $ref: ReportGenerationStatus.yaml
    deprecated: true
    description: Deprecated compatibility alias for generation_status.
  source_report_run_id:
    type:
      - string
      - 'null'
    format: uuid
  superseded_by_report_run_id:
    type:
      - string
      - 'null'
    format: uuid
  report_definition_id:
    type:
      - string
      - 'null'
    format: uuid
  report_definition_snapshot_id:
    type:
      - string
      - 'null'
    format: uuid
  deleted_at:
    type:
      - string
      - 'null'
    format: date-time
  cancellation_reason_code:
    type:
      - string
      - 'null'
  failure_reason_code:
    type:
      - string
      - 'null'
  generated_at:
    type:
      - string
      - 'null'
    format: date-time
  output_expires_at:
    type:
      - string
      - 'null'
    format: date-time
  outputs_available:
    type: boolean
  outputs:
    type: array
    items:
      $ref: ReportOutput.yaml
