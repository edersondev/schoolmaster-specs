type: object
required:
  - filters
  - output_formats
properties:
  report_type:
    oneOf:
      - $ref: ReportType.yaml
      - type: 'null'
  report_definition_id:
    type:
      - string
      - 'null'
    format: uuid
  filters:
    $ref: ReportFilters.yaml
  output_formats:
    type: array
    minItems: 1
    uniqueItems: true
    items:
      $ref: ReportFormat.yaml
