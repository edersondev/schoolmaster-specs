type: object
additionalProperties: false
required:
  - id
  - street
  - number
  - neighborhood
  - city
  - state
  - zip_code
properties:
  id:
    type: string
    format: uuid
  street:
    type: string
  number:
    type: string
    pattern: '^[0-9]+$'
    maxLength: 10
    description: Digit-only address number. API returns a string, while storage uses unsigned integer.
  complement:
    type:
      - string
      - 'null'
    maxLength: 255
  neighborhood:
    type: string
  city:
    type: string
  state:
    type: string
    maxLength: 4
  zip_code:
    type: string
    pattern: '^[0-9]+$'
    maxLength: 12
  country:
    type:
      - string
      - 'null'
