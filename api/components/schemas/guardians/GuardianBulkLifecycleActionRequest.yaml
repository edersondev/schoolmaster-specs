type: object
required:
  - resource_type
  - action
  - record_ids
  - effective_at
  - reason
additionalProperties: false
properties:
  resource_type:
    type: string
    enum:
      - guardians
  action:
    $ref: ../common/LifecycleAction.yaml
  record_ids:
    type: array
    minItems: 1
    maxItems: 50
    uniqueItems: true
    items:
      type: string
      format: uuid
  effective_at:
    type: string
    format: date
  reason:
    type: string
    minLength: 1
    maxLength: 500
