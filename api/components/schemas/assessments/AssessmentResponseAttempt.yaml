type: object
required:
  - id
  - school_id
  - student_profile_id
  - questionnaire_id
  - learning_set_id
  - academic_period_id
  - submission_state
  - grading_status
  - answers
  - file_summary
properties:
  id:
    type: string
    format: uuid
  school_id:
    type: string
    format: uuid
  student_profile_id:
    type: string
    format: uuid
  questionnaire_id:
    type: string
    format: uuid
  learning_set_id:
    type: string
    format: uuid
  academic_period_id:
    type: string
    format: uuid
  submission_state:
    $ref: '#/$defs/AssessmentSubmissionState'
  submitted_at:
    type:
      - string
      - 'null'
    format: date-time
  grading_status:
    $ref: '#/$defs/AssessmentGradingStatus'
  score_summary:
    oneOf:
      - $ref: '#/$defs/AssessmentScoreSummary'
      - type: 'null'
  feedback_summary:
    type:
      - string
      - 'null'
    maxLength: 1000
  answers:
    type: array
    items:
      $ref: '#/$defs/AssessmentAnswer'
  file_summary:
    $ref: '#/$defs/AssessmentFileSummary'
$defs:
  AssessmentSubmissionState:
    type: string
    enum:
      - submitted
      - scan_blocked
      - scan_failed
      - needs_review
      - partially_graded
      - graded
      - returned
      - exempted
  AssessmentGradingStatus:
    type: string
    enum:
      - unsubmitted
      - submitted
      - scan_blocked
      - scan_failed
      - needs_review
      - partially_graded
      - graded
      - returned
      - exempted
  AssessmentScoreSummary:
    type: object
    additionalProperties: false
    required:
      - earned_points
      - possible_points
      - percentage
    properties:
      earned_points:
        type: number
        minimum: 0
      possible_points:
        type: number
        minimum: 0
      percentage:
        type:
          - number
          - 'null'
        minimum: 0
        maximum: 100
  AssessmentAnswer:
    type: object
    required:
      - id
      - question_id
      - question_type
      - grading_status
      - visibility_state
    properties:
      id:
        type: string
        format: uuid
      question_id:
        type: string
        format: uuid
      question_type:
        $ref: ../questionnaires/QuestionType.yaml
      answer_text:
        type:
          - string
          - 'null'
        minLength: 1
        maxLength: 10000
        description: Plain text answer content; never report-visible.
      file:
        oneOf:
          - $ref: '#/$defs/AssessmentFileAttachment'
          - type: 'null'
      grading_status:
        $ref: '#/$defs/AssessmentGradingStatus'
      visibility_state:
        type: string
        enum:
          - student_safe
          - teacher_review
          - report_summary_only
          - unavailable
  AssessmentFileAttachment:
    type: object
    required:
      - id
      - filename
      - file_category
      - file_size_bytes
      - scan_status
      - availability
    properties:
      id:
        type: string
        format: uuid
      filename:
        type: string
        maxLength: 255
      declared_content_type:
        type: string
      detected_content_type:
        type:
          - string
          - 'null'
      file_category:
        type: string
        enum:
          - pdf
          - image
          - text
          - office
      file_size_bytes:
        type: integer
        minimum: 1
        maximum: 26214400
      scan_status:
        type: string
        enum:
          - pending
          - clean
          - failed
      availability:
        type: string
        enum:
          - unavailable
          - clean_download_allowed
          - scan_pending
          - scan_failed
  AssessmentFileSummary:
    type: object
    additionalProperties: false
    required:
      - pending_count
      - clean_count
      - failed_count
    properties:
      pending_count:
        type: integer
        minimum: 0
      clean_count:
        type: integer
        minimum: 0
      failed_count:
        type: integer
        minimum: 0
  StudentQuestionnaireResponseSubmissionRequest:
    type: object
    additionalProperties: false
    required:
      - questionnaire_id
      - learning_set_id
      - answers
    properties:
      questionnaire_id:
        type: string
        format: uuid
      learning_set_id:
        type: string
        format: uuid
      answers:
        type: array
        minItems: 1
        items:
          $ref: '#/$defs/StudentAssessmentAnswerInput'
  StudentAssessmentAnswerInput:
    type: object
    additionalProperties: false
    required:
      - question_id
      - question_type
    properties:
      question_id:
        type: string
        format: uuid
      question_type:
        $ref: ../questionnaires/QuestionType.yaml
      answer_text:
        type: string
        minLength: 1
        maxLength: 10000
      file:
        type: string
        format: binary
        description: One uploaded file for file_response questions only.
  GradeAssessmentResponseRequest:
    type: object
    additionalProperties: false
    required:
      - grading_outcomes
    properties:
      grading_outcomes:
        type: array
        minItems: 1
        items:
          type: object
          additionalProperties: false
          required:
            - answer_id
            - status
          properties:
            answer_id:
              type: string
              format: uuid
            status:
              type: string
              enum:
                - graded
                - returned
                - exempted
            score:
              type:
                - number
                - 'null'
              minimum: 0
              maximum: 100
            feedback_summary:
              type:
                - string
                - 'null'
              maxLength: 1000
            private_grading_note:
              type:
                - string
                - 'null'
              maxLength: 2000
