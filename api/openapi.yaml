        '422':
          $ref: '#/components/responses/ValidationError'
  /api/v1/student/grades:
    get:
      tags:
      - Grades
      summary: List grade records for the authenticated student
      operationId: listStudentGrades
      parameters:
      - $ref: '#/components/parameters/TenantContext'
      - $ref: '#/components/parameters/AcademicPeriodFilter'
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: Student grade collection
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/PaginatedEnvelope'
                - type: object
                  properties:
                    data:
                      type: array
                      items:
                        $ref: '#/components/schemas/GradeRecord'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/TenantMismatch'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/v1/student/attendance:
    get:
      tags:
      - Attendance
      summary: List attendance records for the authenticated student
      operationId: listStudentAttendance
      parameters:
      - $ref: '#/components/parameters/TenantContext'
      - $ref: '#/components/parameters/AcademicPeriodFilter'
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: Student attendance collection
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/PaginatedEnvelope'
                - type: object
                  properties:
                    data:
                      type: array
                      items:
                        $ref: '#/components/schemas/AttendanceRecord'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/TenantMismatch'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/v1/reports:
    get:
      tags:
      - Reports
      summary: List report requests for the resolved school
      operationId: listReports
      parameters:
      - $ref: '#/components/parameters/TenantContext'
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/PerPage'
      - name: report_type
        in: query
        schema:
          $ref: '#/components/schemas/ReportType'
      responses:
        '200':
          description: Report request collection
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/PaginatedEnvelope'
                - type: object
                  properties:
                    data:
                      type: array
                      items:
                        $ref: '#/components/schemas/ReportRun'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/TenantMismatch'
        '422':
          $ref: '#/components/responses/ValidationError'
    post:
      tags:
      - Reports
      summary: Request a tenant-scoped report
      operationId: requestReport
      parameters:
      - $ref: '#/components/parameters/TenantContext'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReportRequest'
      responses:
        '202':
          description: Report request accepted
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/SuccessEnvelope'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/ReportRun'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/TenantMismatch'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/v1/reports/{reportRunId}/download:
    get:
      tags:
      - Reports
      summary: Download a generated report output
      operationId: downloadReport
      parameters:
      - $ref: '#/components/parameters/TenantContext'
      - $ref: '#/components/parameters/ReportRunId'
      - name: format
        in: query
        required: true
        schema:
          $ref: '#/components/schemas/ReportFormat'
      responses:
        '200':
          description: Generated report file download
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/TenantMismatch'
        '404':
          $ref: '#/components/responses/NotFound'
        '410':
          $ref: '#/components/responses/OutputExpired'
        '422':
          $ref: '#/components/responses/ValidationError'
components:
  parameters:
    AcademicPeriodFilter:
      name: academic_period_id
      in: query
      schema:
        type: string
        format: uuid
    AcademicPeriodFilterRequired:
      name: academic_period_id
      in: query
      required: true
      schema:
        type: string
        format: uuid
    ContentItemId:
      name: contentItemId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    PerPage:
      name: per_page
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 25
    ReportRunId:
      name: reportRunId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    SchoolId:
      name: schoolId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    Sort:
      name: sort
      in: query
      description: Comma-separated field names; prefix with '-' for descending.
      schema:
        type: string
    StatusFilter:
      name: status
      in: query
      schema:
        type: string
    TenantContext:
      name: X-School-Id
      in: header
      required: false
      description: 'Explicit school tenant context for school-scoped requests. Required
        when the authenticated session is not already bound to exactly one active
        school.

        '
      schema:
        type: string
        format: uuid
  responses:
    Forbidden:
      description: The authenticated user lacks permission for this action
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    NotFound:
      description: Resource was not found in the permitted scope
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    OutputExpired:
      description: Generated report output file has expired; request a new ReportRun
        with the same filters
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    TenantMismatch:
      description: Tenant context is missing, inactive, or outside permitted scope
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    TeacherWorkflowForbidden:
      description: Tenant context is missing, inactive, or outside permitted scope, or the authenticated user lacks the required teacher workflow permission.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    AuthLockout:
      description: Login is locked after 5 failed attempts for either submitted email or source IP within 15 minutes
      headers:
        Retry-After:
          description: Seconds until another login attempt may be accepted.
          schema:
            type: integer
            minimum: 1
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    TokenRejected:
      description: Bearer token is expired, revoked, or tied to an inactive user or inactive school
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Unauthorized:
      description: Authentication is missing or invalid
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    ValidationError:
      description: Validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
  schemas:
    AcademicPeriod:
      type: object
      required:
      - id
      - school_id
      - academic_year_id
      - name
      - sequence
      - start_date
      - end_date
      - status
      properties:
        id:
          type: string
          format: uuid
        school_id:
          type: string
          format: uuid
        academic_year_id:
          type: string
          format: uuid
        name:
          type: string
        sequence:
          type: integer
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
        status:
          $ref: '#/components/schemas/AcademicStatus'
    AcademicPeriodCreateRequest:
      type: object
      required:
      - academic_year_id
      - name
      - sequence
      - start_date
      - end_date
      properties:
        academic_year_id:
          type: string
          format: uuid
        name:
          type: string
        sequence:
          type: integer
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
    AcademicYear:
      type: object
      required:
      - id
      - school_id
      - name
      - start_date
      - end_date
      - status
      properties:
        id:
          type: string
          format: uuid
        school_id:
          type: string
          format: uuid
        name:
          type: string
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
        status:
          $ref: '#/components/schemas/AcademicStatus'
    AcademicYearCreateRequest:
      type: object
      required:
      - name
      - start_date
      - end_date
      properties:
        name:
          type: string
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
    AttendanceCreateRequest:
      type: object
      required:
      - student_profile_id
      - academic_period_id
      - attendance_date
      - attendance_status
      properties:
        student_profile_id:
          type: string
          format: uuid
        academic_period_id:
          type: string
          format: uuid
        attendance_date:
          type: string
          format: date
        attendance_status:
          $ref: '#/components/schemas/AttendanceStatus'
    AttendanceRecord:
      type: object
      required:
      - id
      - school_id
      - student_profile_id
      - academic_period_id
      - recorded_by_user_id
      - attendance_date
      - attendance_status
      - status
      properties:
        id:
          type: string
          format: uuid
        school_id:
          type: string
          format: uuid
        student_profile_id:
          type: string
          format: uuid
        academic_period_id:
          type: string
          format: uuid
        recorded_by_user_id:
          type: string
          format: uuid
        attendance_date:
          type: string
          format: date
        attendance_status:
          $ref: '#/components/schemas/AttendanceStatus'
        status:
          $ref: '#/components/schemas/Status'
    AuthSession:
      type: object
      required:
      - token
      - token_expires_at
      - user
      - roles
      - permissions
      properties:
        token:
          type: string
        token_expires_at:
          type: string
          format: date-time
          description: Bearer token expiration timestamp, 8 hours after issuance.
        user:
          $ref: '#/components/schemas/User'
        resolved_school:
          oneOf:
          - $ref: '#/components/schemas/School'
          - type: 'null'
        roles:
          type: array
          items:
            $ref: '#/components/schemas/Role'
        permissions:
          type: array
          items:
            $ref: '#/components/schemas/Permission'
    GradeCreateRequest:
      type: object
      required:
      - student_profile_id
      - academic_period_id
      - grade_value
      properties:
        student_profile_id:
          type: string
          format: uuid
        academic_period_id:
          type: string
          format: uuid
        grade_value:
          type: number
          minimum: 0
          maximum: 100
        grade_label:
          type: string
    GradeRecord:
      type: object
      required:
      - id
      - school_id
      - student_profile_id
      - academic_period_id
      - recorded_by_user_id
      - grade_value
      - status
      - recorded_at
      properties:
        id:
          type: string
          format: uuid
        school_id:
          type: string
          format: uuid
        student_profile_id:
          type: string
          format: uuid
        academic_period_id:
          type: string
          format: uuid
        recorded_by_user_id:
          type: string
          format: uuid
        grade_value:
          type: number
          minimum: 0
          maximum: 100
        grade_label:
          type:
          - string
          - 'null'
        status:
          $ref: '#/components/schemas/Status'
        recorded_at:
          type: string
          format: date-time
    Guardian:
      type: object
      required:
      - id
      - school_id
      - full_name
      - relationship_type
      - status
      properties:
        id:
          type: string
          format: uuid
        school_id:
          type: string
          format: uuid
        full_name:
          type: string
        relationship_type:
          type: string
        contact_email:
          type:
          - string
          - 'null'
          format: email
        contact_phone:
          type:
          - string
          - 'null'
        status:
          $ref: '#/components/schemas/Status'
    GuardianCreateRequest:
      type: object
      required:
      - full_name
      - relationship_type
      properties:
        full_name:
          type: string
        relationship_type:
          type: string
        contact_email:
          type: string
          format: email
        contact_phone:
          type: string
        student_profile_ids:
          type: array
          items:
            type: string
            format: uuid
    LearningSet:
      type: object
      required:
      - id
      - school_id
      - owner_user_id
      - academic_period_id
      - title
      - status
      - entries
      - assignments
      properties:
        id:
          type: string
          format: uuid
        school_id:
          type: string
          format: uuid
        owner_user_id:
          type: string
          format: uuid
        academic_period_id:
          type: string
          format: uuid
        title:
          type: string
        published_at:
          type:
          - string
          - 'null'
          format: date-time
        status:
          type: string
          enum:
          - draft
          - published
          - inactive
          - archived
        entries:
          type: array
          items:
            $ref: '#/components/schemas/LearningSetEntry'
        assignments:
          type: array
          items:
            $ref: '#/components/schemas/LearningSetAssignment'
    LearningSetCreateRequest:
      type: object
      required:
      - academic_period_id
      - title
      - entries
      - student_profile_ids
      properties:
        academic_period_id:
          type: string
          format: uuid
        title:
          type: string
        entries:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/LearningSetEntry'
        student_profile_ids:
          type: array
          minItems: 1
          items:
            type: string
            format: uuid
    LoginRequest:
      type: object
      required:
      - email
      - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        school_id:
          type:
          - string
          - 'null'
          format: uuid
    LogoutResult:
      type: object
      required:
      - revoked
      properties:
        revoked:
          type: boolean
          description: Indicates the current bearer token was revoked by logout.
    PaginatedEnvelope:
      allOf:
      - $ref: '#/components/schemas/SuccessEnvelope'
      - type: object
        required:
        - data
        - meta
        properties:
          data:
            type: array
            items: {}
          meta:
            type: object
            required:
            - page
            - per_page
            - total
            properties:
              page:
                type: integer
              per_page:
                type: integer
              total:
                type: integer
    Permission:
      type: object
      required:
      - id
      - code
      - name
      - scope
      - status
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
        name:
          type: string
        scope:
          $ref: '#/components/schemas/Scope'
        status:
          $ref: '#/components/schemas/Status'
    Questionnaire:
      type: object
      required:
      - id
      - school_id
      - owner_user_id
      - title
      - status
      - questions
      properties:
        id:
          type: string
          format: uuid
        school_id:
          type: string
          format: uuid
        owner_user_id:
          type: string
          format: uuid
        title:
          type: string
        status:
          type: string
          enum:
          - draft
          - active
          - inactive
          - archived
        questions:
          type: array
          items:
            $ref: '#/components/schemas/QuestionnaireQuestion'
    QuestionnaireCreateRequest:
      type: object
      required:
      - title
      - questions
      properties:
        title:
          type: string
        questions:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/QuestionnaireQuestionInput'
    ReportFormat:
      type: string
      enum:
      - pdf
      - csv
    ReportRequest:
      type: object
      required:
      - report_type
      - filters
      properties:
        report_type:
          $ref: '#/components/schemas/ReportType'
        filters:
          $ref: '#/components/schemas/ReportFilters'
    ReportRun:
      type: object
      required:
      - id
      - school_id
      - requested_by_user_id
      - report_type
      - filter_summary
      - output_formats
      - status
      - outputs_available
      properties:
        id:
          type: string
          format: uuid
        school_id:
          type: string
          format: uuid
        requested_by_user_id:
          type: string
          format: uuid
        report_type:
          $ref: '#/components/schemas/ReportType'
        filter_summary:
          $ref: '#/components/schemas/ReportFilters'
        output_formats:
          type: array
          minItems: 2
          items:
            $ref: '#/components/schemas/ReportFormat'
        status:
          type: string
          enum:
          - requested
          - generated
          - failed
          - inactive
        generated_at:
          type:
          - string
          - 'null'
          format: date-time
        output_expires_at:
          type:
          - string
          - 'null'
          format: date-time
        outputs_available:
          type: boolean
    ReportType:
      type: string
      enum:
      - attendance
      - grades
      - academic_structure
      - school_activity
    Role:
      type: object
      required:
      - id
      - scope
      - name
      - status
      - permissions
      properties:
        id:
          type: string
          format: uuid
        school_id:
          type:
          - string
          - 'null'
          format: uuid
        scope:
          $ref: '#/components/schemas/Scope'
        name:
          type: string
        status:
          $ref: '#/components/schemas/Status'
        permissions:
          type: array
          items:
            $ref: '#/components/schemas/Permission'
    RoleCreateRequest:
      type: object
      required:
      - scope
      - name
      - permission_ids
      properties:
        school_id:
          type: string
          format: uuid
        scope:
          $ref: '#/components/schemas/Scope'
        name:
          type: string
        permission_ids:
          type: array
          items:
            type: string
            format: uuid
    School:
      type: object
      required:
      - id
      - name
      - code
      - status
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        code:
          type: string
        status:
          $ref: '#/components/schemas/Status'
        contact_email:
          type:
          - string
          - 'null'
          format: email
        contact_phone:
          type:
          - string
          - 'null'
        address_summary:
          type:
          - string
          - 'null'
    SchoolCreateRequest:
      type: object
      required:
      - name
      - code
      properties:
        name:
          type: string
        code:
          type: string
        contact_email:
          type: string
          format: email
        contact_phone:
          type: string
        address_summary:
          type: string
    SchoolUpdateRequest:
      type: object
      properties:
        name:
          type: string
        status:
          $ref: '#/components/schemas/Status'
        contact_email:
          type: string
          format: email
        contact_phone:
          type: string
        address_summary:
          type: string
    StudentLearningSetTimelineItem:
      type: object
      required:
      - id
      - academic_period_id
      - title
      - status
      - published_at
      - entries
      properties:
        id:
          type: string
          format: uuid
        academic_period_id:
          type: string
          format: uuid
        title:
          type: string
        status:
          type: string
          enum:
          - published
        published_at:
          type: string
          format: date-time
        entries:
          type: array
          items:
            $ref: '#/components/schemas/StudentLearningSetEntry'
    SuccessEnvelope:
      type: object
      required:
      - data
      - meta
      properties:
        data: {}
        meta:
          type: object
          additionalProperties: true
    TeacherContentCreateRequest:
      type: object
      required:
      - title
      - content_type
      - file
      properties:
        folder_id:
          type: string
          format: uuid
        title:
          type: string
        content_type:
          $ref: '#/components/schemas/TeacherContentType'
        file:
          type: string
          format: binary
          description: PDF, image, text, or office document up to 25 MB.
    TeacherContentItem:
      type: object
      required:
      - id
      - school_id
      - owner_user_id
      - title
      - content_type
      - file_size_bytes
      - scan_status
      - status
      properties:
        id:
          type: string
          format: uuid
        school_id:
          type: string
          format: uuid
        owner_user_id:
          type: string
          format: uuid
        folder_id:
          type:
          - string
          - 'null'
          format: uuid
        title:
          type: string
        content_type:
          $ref: '#/components/schemas/TeacherContentType'
        declared_content_type:
          type: string
        detected_content_type:
          type: string
        file_size_bytes:
          type: integer
          maximum: 26214400
        scan_status:
          $ref: '#/components/schemas/TeacherContentScanStatus'
        status:
          type: string
          enum:
          - draft
          - active
          - inactive
          - archived
    User:
      type: object
      required:
      - id
      - full_name
      - email
      - status
      - roles
      properties:
        id:
          type: string
          format: uuid
        school_id:
          type:
          - string
          - 'null'
          format: uuid
        full_name:
          type: string
        email:
          type: string
          format: email
        status:
          $ref: '#/components/schemas/Status'
        roles:
          type: array
          items:
            $ref: '#/components/schemas/Role'
    UserCreateRequest:
      type: object
      required:
      - full_name
      - email
      - role_ids
      properties:
        school_id:
          type: string
          format: uuid
        full_name:
          type: string
        email:
          type: string
          format: email
        role_ids:
          type: array
          items:
            type: string
            format: uuid
    AcademicStatus:
      type: string
      enum:
      - planned
      - active
      - closed
      - inactive
    AttendanceStatus:
      type: string
      enum:
      - present
      - absent
      - late
      - excused
      - remote
      - suspended
    ErrorEnvelope:
      type: object
      required:
      - error
      properties:
        error:
          type: object
          required:
          - code
          - message
          properties:
            code:
              type: string
              examples:
              - validation_failed
              - forbidden
              - tenant_mismatch
              - auth_locked
              - token_expired
              - token_revoked
              - inactive_user
              - inactive_school
            message:
              type: string
            details:
              type: object
              additionalProperties: true
    LearningSetAssignment:
      type: object
      required:
      - id
      - school_id
      - learning_set_id
      - student_profile_id
      - status
      - assigned_at
