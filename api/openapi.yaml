openapi: 3.1.0
info:
  title: SchoolMaster API
  version: 0.1.0
  summary: >-
    Repository-level aggregate publication target for the SchoolMaster platform
    API.
  description: >
    This OpenAPI document is the contract between the SchoolMaster frontend and
    backend repositories once feature contracts are promoted into the aggregate.
    The target implementations are a Laravel API and a Vue 3 SPA. Approved
    feature-level contracts live under specs/*/contracts/ before promotion into
    this repository-level aggregate.
servers:
  - url: /
    description: API origin; promoted paths include the /api/v1 version prefix
tags:
  - name: Auth
    description: Authentication and current-session operations.
  - name: Schools
    description: Platform-level school tenant provisioning and review.
  - name: Users
    description: Tenant-aware user account administration.
  - name: Roles
    description: Platform and school role management.
  - name: Permissions
    description: Permission definitions exposed through scoped roles.
  - name: Academic Years
    description: School-owned academic year management.
  - name: Academic Periods
    description: Periods inside academic years for academic operations.
  - name: Guardians
    description: Guardian records linked to student profiles.
  - name: Guardian Self-Service
    description: Read-only guardian access to approved student information.
  - name: Student Profiles
    description: School-scoped student profile and enrollment lifecycle management.
  - name: Teacher Content
    description: Teacher-managed folders and instructional content.
  - name: Questionnaires
    description: Teacher-authored instructional questionnaires.
  - name: Learning Sets
    description: Ordered instructional sequences for student use.
  - name: Grades
    description: Student grade records in permitted scope.
  - name: Attendance
    description: Student attendance records in permitted scope.
  - name: Reports
    description: Tenant-scoped report requests, lifecycle, definitions, catalog, and outputs.
  - name: Account Lifecycle
    description: >-
      Account invitation, password setup, password reset, lock, recovery, and
      reactivation workflows.
  - name: Class Sections
    description: >-
      School-owned ClassSection/Roster structures for academic-period-scoped
      teaching organization.
  - name: Roster Memberships
    description: >-
      School-owned roster membership administration with all-or-nothing batch
      changes.
  - name: Teacher Assignments
    description: >-
      School-owned teacher assignment administration and teacher
      own-active-assignment reads.
  - name: Platform Support
    description: >-
      Platform-wide minimized operational reporting and read-only support access
      workflows with explicit approval gates.
