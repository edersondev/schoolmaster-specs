openapi: 3.1.0
info:
  title: SchoolMaster API
  version: 0.1.0
  summary: Repository-level aggregate publication target for the SchoolMaster platform
    API.
  description: 'This OpenAPI document is the contract between the SchoolMaster frontend
    and backend repositories once feature contracts are promoted into the aggregate.
    The target implementations are a Laravel API and a Vue 3 SPA. Approved feature-level
    contracts live under specs/*/contracts/ before promotion into this repository-level
    aggregate.

    '
servers:
- url: /
  description: API origin; promoted paths include the /api/v1 version prefix
tags:
- name: Auth
  description: Authentication and current-session operations.
- name: Schools
  description: Platform-level school tenant provisioning and review.
- name: Users
  description: Tenant-aware user account administration.
- name: Roles
  description: Platform and school role management.
- name: Permissions
  description: Permission definitions exposed through scoped roles.
- name: Academic Years
  description: School-owned academic year management.
- name: Academic Periods
  description: Periods inside academic years for academic operations.
- name: Guardians
  description: Guardian records linked to student profiles.
paths:
  /api/v1/auth/login:
    post:
      tags:
      - Auth
      summary: Authenticate a user in platform or school context
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authentication succeeded
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/SuccessEnvelope'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/AuthSession'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/v1/auth/me:
    get:
      tags:
      - Auth
      summary: Return the authenticated user, resolved tenant, roles, and permissions
      operationId: getCurrentUser
      parameters:
      - $ref: '#/components/parameters/TenantContext'
      responses:
        '200':
          description: Current authenticated session
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/SuccessEnvelope'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/AuthSession'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/TenantMismatch'
  /api/v1/schools:
    get:
      tags:
      - Schools
      summary: List schools visible to the requester
      operationId: listSchools
      parameters:
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/PerPage'
      - $ref: '#/components/parameters/StatusFilter'
      - $ref: '#/components/parameters/Sort'
      responses:
        '200':
          description: School collection
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/PaginatedEnvelope'
                - type: object
                  properties:
                    data:
                      type: array
                      items:
                        $ref: '#/components/schemas/School'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags:
      - Schools
      summary: Create a school tenant
      operationId: createSchool
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SchoolCreateRequest'
      responses:
        '201':
          description: School created
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/SuccessEnvelope'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/School'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/v1/schools/{schoolId}:
    get:
      tags:
      - Schools
      summary: Review one school tenant
      operationId: getSchool
      parameters:
      - $ref: '#/components/parameters/SchoolId'
      responses:
        '200':
          description: School detail
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/SuccessEnvelope'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/School'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags:
      - Schools
      summary: Update school profile or operational status
      operationId: updateSchool
      parameters:
      - $ref: '#/components/parameters/SchoolId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SchoolUpdateRequest'
      responses:
        '200':
          description: School updated
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/SuccessEnvelope'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/School'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/v1/users:
    get:
      tags:
      - Users
      summary: List users in permitted scope
      operationId: listUsers
      parameters:
      - $ref: '#/components/parameters/TenantContext'
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/PerPage'
      - $ref: '#/components/parameters/StatusFilter'
      - $ref: '#/components/parameters/Sort'
      responses:
        '200':
          description: User collection
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/PaginatedEnvelope'
                - type: object
                  properties:
                    data:
                      type: array
                      items:
                        $ref: '#/components/schemas/User'
        '403':
          $ref: '#/components/responses/TenantMismatch'
    post:
      tags:
      - Users
      summary: Create a user inside the permitted scope
      operationId: createUser
      parameters:
      - $ref: '#/components/parameters/TenantContext'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreateRequest'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/SuccessEnvelope'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/User'
        '403':
          $ref: '#/components/responses/TenantMismatch'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/v1/roles:
    get:
      tags:
      - Roles
      summary: List roles in permitted scope with inherited permissions
      operationId: listRoles
      parameters:
      - $ref: '#/components/parameters/TenantContext'
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/PerPage'
      - $ref: '#/components/parameters/StatusFilter'
      responses:
        '200':
          description: Role collection
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/PaginatedEnvelope'
                - type: object
                  properties:
                    data:
                      type: array
                      items:
                        $ref: '#/components/schemas/Role'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/TenantMismatch'
    post:
      tags:
      - Roles
      summary: Create a scoped role
      operationId: createRole
      parameters:
      - $ref: '#/components/parameters/TenantContext'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoleCreateRequest'
      responses:
        '201':
          description: Role created
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/SuccessEnvelope'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/Role'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/v1/permissions:
    get:
      tags:
      - Permissions
      summary: List permission definitions available to the requester
      operationId: listPermissions
      parameters:
      - $ref: '#/components/parameters/TenantContext'
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: Permission collection
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/PaginatedEnvelope'
                - type: object
                  properties:
                    data:
                      type: array
                      items:
                        $ref: '#/components/schemas/Permission'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /api/v1/academic-years:
    get:
      tags:
      - Academic Years
      summary: List academic years for a school
      operationId: listAcademicYears
      parameters:
      - $ref: '#/components/parameters/TenantContext'
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/PerPage'
      - $ref: '#/components/parameters/StatusFilter'
      responses:
        '200':
          description: Academic year collection
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/PaginatedEnvelope'
                - type: object
                  properties:
                    data:
                      type: array
                      items:
                        $ref: '#/components/schemas/AcademicYear'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/TenantMismatch'
    post:
      tags:
      - Academic Years
      summary: Create an academic year for the resolved school
      operationId: createAcademicYear
      parameters:
      - $ref: '#/components/parameters/TenantContext'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AcademicYearCreateRequest'
      responses:
        '201':
          description: Academic year created
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/SuccessEnvelope'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/AcademicYear'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/v1/academic-periods:
    get:
      tags:
      - Academic Periods
      summary: List academic periods for a school
      operationId: listAcademicPeriods
      parameters:
      - $ref: '#/components/parameters/TenantContext'
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/PerPage'
      - $ref: '#/components/parameters/StatusFilter'
      - name: academic_year_id
        in: query
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Academic period collection
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/PaginatedEnvelope'
                - type: object
                  properties:
                    data:
                      type: array
                      items:
                        $ref: '#/components/schemas/AcademicPeriod'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/TenantMismatch'
    post:
      tags:
      - Academic Periods
      summary: Create an academic period inside an academic year
      operationId: createAcademicPeriod
      parameters:
      - $ref: '#/components/parameters/TenantContext'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AcademicPeriodCreateRequest'
      responses:
        '201':
          description: Academic period created
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/SuccessEnvelope'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/AcademicPeriod'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/v1/guardians:
    get:
      tags:
      - Guardians
      summary: List guardians for a school
      operationId: listGuardians
      parameters:
      - $ref: '#/components/parameters/TenantContext'
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/PerPage'
      - $ref: '#/components/parameters/StatusFilter'
      responses:
        '200':
          description: Guardian collection
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/PaginatedEnvelope'
                - type: object
                  properties:
                    data:
                      type: array
                      items:
                        $ref: '#/components/schemas/Guardian'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/TenantMismatch'
    post:
      tags:
      - Guardians
      summary: Create or maintain a guardian record
      operationId: createGuardian
      parameters:
      - $ref: '#/components/parameters/TenantContext'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GuardianCreateRequest'
      responses:
        '201':
          description: Guardian created
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/SuccessEnvelope'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/Guardian'
        '422':
          $ref: '#/components/responses/ValidationError'
components:
  parameters:
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    PerPage:
      name: per_page
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 25
    SchoolId:
      name: schoolId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    Sort:
      name: sort
      in: query
      description: Comma-separated field names; prefix with '-' for descending.
      schema:
        type: string
    StatusFilter:
      name: status
      in: query
      schema:
        type: string
    TenantContext:
      name: X-School-Id
      in: header
      required: false
      description: 'Explicit school tenant context for school-scoped requests. Required
        when the authenticated session is not already bound to exactly one active
        school.

        '
      schema:
        type: string
        format: uuid
  responses:
    Forbidden:
      description: The authenticated user lacks permission for this action
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    NotFound:
      description: Resource was not found in the permitted scope
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    TenantMismatch:
      description: Tenant context is missing, inactive, or outside permitted scope
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Unauthorized:
      description: Authentication is missing or invalid
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    ValidationError:
      description: Validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
  schemas:
    AcademicPeriod:
      type: object
      required:
      - id
      - school_id
      - academic_year_id
      - name
      - sequence
      - start_date
      - end_date
      - status
      properties:
        id:
          type: string
          format: uuid
        school_id:
          type: string
          format: uuid
        academic_year_id:
          type: string
          format: uuid
        name:
          type: string
        sequence:
          type: integer
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
        status:
          $ref: '#/components/schemas/AcademicStatus'
    AcademicPeriodCreateRequest:
      type: object
      required:
      - academic_year_id
      - name
      - sequence
      - start_date
      - end_date
      properties:
        academic_year_id:
          type: string
          format: uuid
        name:
          type: string
        sequence:
          type: integer
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
    AcademicYear:
      type: object
      required:
      - id
      - school_id
      - name
      - start_date
      - end_date
      - status
      properties:
        id:
          type: string
          format: uuid
        school_id:
          type: string
          format: uuid
        name:
          type: string
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
        status:
          $ref: '#/components/schemas/AcademicStatus'
    AcademicYearCreateRequest:
      type: object
      required:
      - name
      - start_date
      - end_date
      properties:
        name:
          type: string
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
    AuthSession:
      type: object
      required:
      - token
      - user
      - roles
      - permissions
      properties:
        token:
          type: string
        user:
          $ref: '#/components/schemas/User'
        resolved_school:
          oneOf:
          - $ref: '#/components/schemas/School'
          - type: 'null'
        roles:
          type: array
          items:
            $ref: '#/components/schemas/Role'
        permissions:
          type: array
          items:
            $ref: '#/components/schemas/Permission'
    Guardian:
      type: object
      required:
      - id
      - school_id
      - full_name
      - relationship_type
      - status
      properties:
        id:
          type: string
          format: uuid
        school_id:
          type: string
          format: uuid
        full_name:
          type: string
        relationship_type:
          type: string
        contact_email:
          type:
          - string
          - 'null'
          format: email
        contact_phone:
          type:
          - string
          - 'null'
        status:
          $ref: '#/components/schemas/Status'
    GuardianCreateRequest:
      type: object
      required:
      - full_name
      - relationship_type
      properties:
        full_name:
          type: string
        relationship_type:
          type: string
        contact_email:
          type: string
          format: email
        contact_phone:
          type: string
        student_profile_ids:
          type: array
          items:
            type: string
            format: uuid
    LoginRequest:
      type: object
      required:
      - email
      - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        school_id:
          type:
          - string
          - 'null'
          format: uuid
    PaginatedEnvelope:
      allOf:
      - $ref: '#/components/schemas/SuccessEnvelope'
      - type: object
        required:
        - data
        - meta
        properties:
          data:
            type: array
            items: {}
          meta:
            type: object
            required:
            - page
            - per_page
            - total
            properties:
              page:
                type: integer
              per_page:
                type: integer
              total:
                type: integer
    Permission:
      type: object
      required:
      - id
      - code
      - name
      - scope
      - status
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
        name:
          type: string
        scope:
          $ref: '#/components/schemas/Scope'
        status:
          $ref: '#/components/schemas/Status'
    Role:
      type: object
      required:
      - id
      - scope
      - name
      - status
      - permissions
      properties:
        id:
          type: string
          format: uuid
        school_id:
          type:
          - string
          - 'null'
          format: uuid
        scope:
          $ref: '#/components/schemas/Scope'
        name:
          type: string
        status:
          $ref: '#/components/schemas/Status'
        permissions:
          type: array
          items:
            $ref: '#/components/schemas/Permission'
    RoleCreateRequest:
      type: object
      required:
      - scope
      - name
      - permission_ids
      properties:
        school_id:
          type: string
          format: uuid
        scope:
          $ref: '#/components/schemas/Scope'
        name:
          type: string
        permission_ids:
          type: array
          items:
            type: string
            format: uuid
    School:
      type: object
      required:
      - id
      - name
      - code
      - status
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        code:
          type: string
        status:
          $ref: '#/components/schemas/Status'
        contact_email:
          type:
          - string
          - 'null'
          format: email
        contact_phone:
          type:
          - string
          - 'null'
        address_summary:
          type:
          - string
          - 'null'
    SchoolCreateRequest:
      type: object
      required:
      - name
      - code
      properties:
        name:
          type: string
        code:
          type: string
        contact_email:
          type: string
          format: email
        contact_phone:
          type: string
        address_summary:
          type: string
    SchoolUpdateRequest:
      type: object
      properties:
        name:
          type: string
        status:
          $ref: '#/components/schemas/Status'
        contact_email:
          type: string
          format: email
        contact_phone:
          type: string
        address_summary:
          type: string
    SuccessEnvelope:
      type: object
      required:
      - data
      - meta
      properties:
        data: {}
        meta:
          type: object
          additionalProperties: true
    User:
      type: object
      required:
      - id
      - full_name
      - email
      - status
      - roles
      properties:
        id:
          type: string
          format: uuid
        school_id:
          type:
          - string
          - 'null'
          format: uuid
        full_name:
          type: string
        email:
          type: string
          format: email
        status:
          $ref: '#/components/schemas/Status'
        roles:
          type: array
          items:
            $ref: '#/components/schemas/Role'
    UserCreateRequest:
      type: object
      required:
      - full_name
      - email
      - role_ids
      properties:
        school_id:
          type: string
          format: uuid
        full_name:
          type: string
        email:
          type: string
          format: email
        role_ids:
          type: array
          items:
            type: string
            format: uuid
    AcademicStatus:
      type: string
      enum:
      - planned
      - active
      - closed
      - inactive
    ErrorEnvelope:
      type: object
      required:
      - error
      properties:
        error:
          type: object
          required:
          - code
          - message
          properties:
            code:
              type: string
              examples:
              - validation_failed
              - forbidden
              - tenant_mismatch
            message:
              type: string
            details:
              type: object
              additionalProperties: true
    Scope:
      type: string
      enum:
      - platform
      - school
    Status:
      type: string
      enum:
      - active
      - inactive
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: token
x-notes:
  source_of_truth: schoolmaster-specs
  backend_repository: schoolmaster-backend
  frontend_repository: schoolmaster-frontend
  status: P1 foundation operations promoted from the active feature contract.
  active_feature_contract: specs/001-schoolmaster-platform/contracts/openapi.yaml
security:
- bearerAuth: []
x-promoted-scope:
  feature_id: 001-schoolmaster-platform
  scope: P1 foundation operations
  source_contract: specs/001-schoolmaster-platform/contracts/openapi.yaml
  promoted_paths:
  - /api/v1/auth/login
  - /api/v1/auth/me
  - /api/v1/schools
  - /api/v1/schools/{schoolId}
  - /api/v1/users
  - /api/v1/roles
  - /api/v1/permissions
  - /api/v1/academic-years
  - /api/v1/academic-periods
  - /api/v1/guardians
