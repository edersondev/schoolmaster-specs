openapi: 3.1.0
info:
  title: SchoolMaster API
  version: 1.0.0
  summary: Initial SchoolMaster SaaS v1 contract
  description: >
    Contract source of truth for the SchoolMaster v1 platform foundation.
    All protected endpoints are versioned under /api/v1, return shared
    envelopes, and enforce tenant scope before module-specific behavior.
servers:
  - url: https://api.schoolmaster.test
security:
  - bearerAuth: []
tags:
  - name: Auth
  - name: Schools
  - name: Users
  - name: Roles
  - name: Permissions
  - name: Academic Years
  - name: Academic Periods
  - name: Guardians
  - name: Teacher Content
  - name: Questionnaires
  - name: Learning Sets
  - name: Grades
  - name: Attendance
  - name: Reports
paths:
  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Authenticate a user in platform or school context
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authentication succeeded
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AuthSession'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/v1/auth/me:
    get:
      tags: [Auth]
      summary: Return the authenticated user, resolved tenant, roles, and permissions
      operationId: getCurrentUser
      parameters:
        - $ref: '#/components/parameters/TenantContext'
      responses:
        '200':
          description: Current authenticated session
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AuthSession'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/TenantMismatch'
  /api/v1/schools:
    get:
      tags: [Schools]
      summary: List schools visible to the requester
      operationId: listSchools
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
        - $ref: '#/components/parameters/StatusFilter'
        - $ref: '#/components/parameters/Sort'
      responses:
        '200':
          description: School collection
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/School'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags: [Schools]
      summary: Create a school tenant
      operationId: createSchool
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SchoolCreateRequest'
      responses:
        '201':
          description: School created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/School'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/v1/schools/{schoolId}:
    get:
      tags: [Schools]
      summary: Review one school tenant
      operationId: getSchool
      parameters:
        - $ref: '#/components/parameters/SchoolId'
      responses:
        '200':
          description: School detail
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/School'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Schools]
      summary: Update school profile or operational status
      operationId: updateSchool
      parameters:
        - $ref: '#/components/parameters/SchoolId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SchoolUpdateRequest'
      responses:
        '200':
          description: School updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/School'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/v1/users:
    get:
      tags: [Users]
      summary: List users in permitted scope
      operationId: listUsers
      parameters:
        - $ref: '#/components/parameters/TenantContext'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
        - $ref: '#/components/parameters/StatusFilter'
        - $ref: '#/components/parameters/Sort'
      responses:
        '200':
          description: User collection
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/User'
        '403':
          $ref: '#/components/responses/TenantMismatch'
    post:
      tags: [Users]
      summary: Create a user inside the permitted scope
      operationId: createUser
      parameters:
        - $ref: '#/components/parameters/TenantContext'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreateRequest'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/User'
        '403':
          $ref: '#/components/responses/TenantMismatch'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/v1/roles:
    get:
      tags: [Roles]
      summary: List roles in permitted scope with inherited permissions
      operationId: listRoles
      parameters:
        - $ref: '#/components/parameters/TenantContext'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
        - $ref: '#/components/parameters/StatusFilter'
      responses:
        '200':
          description: Role collection
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Role'
    post:
      tags: [Roles]
      summary: Create a scoped role
      operationId: createRole
      parameters:
        - $ref: '#/components/parameters/TenantContext'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoleCreateRequest'
      responses:
        '201':
          description: Role created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Role'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/v1/permissions:
    get:
      tags: [Permissions]
      summary: List permission definitions available to the requester
      operationId: listPermissions
      parameters:
        - $ref: '#/components/parameters/TenantContext'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: Permission collection
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Permission'
  /api/v1/academic-years:
    get:
      tags: [Academic Years]
      summary: List academic years for a school
      operationId: listAcademicYears
      parameters:
        - $ref: '#/components/parameters/TenantContext'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
        - $ref: '#/components/parameters/StatusFilter'
      responses:
        '200':
          description: Academic year collection
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/AcademicYear'
    post:
      tags: [Academic Years]
      summary: Create an academic year for the resolved school
      operationId: createAcademicYear
      parameters:
        - $ref: '#/components/parameters/TenantContext'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AcademicYearCreateRequest'
      responses:
        '201':
          description: Academic year created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AcademicYear'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/v1/academic-periods:
    get:
      tags: [Academic Periods]
      summary: List academic periods for a school
      operationId: listAcademicPeriods
      parameters:
        - $ref: '#/components/parameters/TenantContext'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
        - $ref: '#/components/parameters/StatusFilter'
        - name: academic_year_id
          in: query
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Academic period collection
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/AcademicPeriod'
    post:
      tags: [Academic Periods]
      summary: Create an academic period inside an academic year
      operationId: createAcademicPeriod
      parameters:
        - $ref: '#/components/parameters/TenantContext'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AcademicPeriodCreateRequest'
      responses:
        '201':
          description: Academic period created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AcademicPeriod'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/v1/guardians:
    get:
      tags: [Guardians]
      summary: List guardians for a school
      operationId: listGuardians
      parameters:
        - $ref: '#/components/parameters/TenantContext'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
        - $ref: '#/components/parameters/StatusFilter'
      responses:
        '200':
          description: Guardian collection
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Guardian'
    post:
      tags: [Guardians]
      summary: Create or maintain a guardian record
      operationId: createGuardian
      parameters:
        - $ref: '#/components/parameters/TenantContext'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GuardianCreateRequest'
      responses:
        '201':
          description: Guardian created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Guardian'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/v1/teacher-content:
    get:
      tags: [Teacher Content]
      summary: List tenant-scoped teacher content items
      operationId: listTeacherContent
      parameters:
        - $ref: '#/components/parameters/TenantContext'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: Teacher content collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedEnvelope'
  /api/v1/questionnaires:
    get:
      tags: [Questionnaires]
      summary: List tenant-scoped questionnaires
      operationId: listQuestionnaires
      parameters:
        - $ref: '#/components/parameters/TenantContext'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: Questionnaire collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedEnvelope'
  /api/v1/learning-sets:
    get:
      tags: [Learning Sets]
      summary: List tenant-scoped learning sets
      operationId: listLearningSets
      parameters:
        - $ref: '#/components/parameters/TenantContext'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: Learning set collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedEnvelope'
  /api/v1/grades:
    get:
      tags: [Grades]
      summary: List grade records in permitted scope
      operationId: listGrades
      parameters:
        - $ref: '#/components/parameters/TenantContext'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: Grade record collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedEnvelope'
  /api/v1/attendance:
    get:
      tags: [Attendance]
      summary: List attendance records in permitted scope
      operationId: listAttendance
      parameters:
        - $ref: '#/components/parameters/TenantContext'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: Attendance record collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedEnvelope'
  /api/v1/student/learning-sets:
    get:
      tags: [Learning Sets]
      summary: List learning sets assigned to the authenticated student
      operationId: listStudentLearningSets
      parameters:
        - $ref: '#/components/parameters/TenantContext'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: Student learning set timeline
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedEnvelope'
  /api/v1/student/grades:
    get:
      tags: [Grades]
      summary: List grade records for the authenticated student
      operationId: listStudentGrades
      parameters:
        - $ref: '#/components/parameters/TenantContext'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: Student grade collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedEnvelope'
  /api/v1/student/attendance:
    get:
      tags: [Attendance]
      summary: List attendance records for the authenticated student
      operationId: listStudentAttendance
      parameters:
        - $ref: '#/components/parameters/TenantContext'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: Student attendance collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedEnvelope'
  /api/v1/reports:
    get:
      tags: [Reports]
      summary: List report requests for the resolved school
      operationId: listReports
      parameters:
        - $ref: '#/components/parameters/TenantContext'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
        - name: report_type
          in: query
          schema:
            $ref: '#/components/schemas/ReportType'
      responses:
        '200':
          description: Report request collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedEnvelope'
    post:
      tags: [Reports]
      summary: Request a tenant-scoped report
      operationId: requestReport
      parameters:
        - $ref: '#/components/parameters/TenantContext'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReportRequest'
      responses:
        '202':
          description: Report request accepted
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ReportRun'
        '403':
          $ref: '#/components/responses/TenantMismatch'
        '422':
          $ref: '#/components/responses/ValidationError'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: token
  parameters:
    TenantContext:
      name: X-School-Id
      in: header
      required: false
      description: >
        Explicit school tenant context for school-scoped requests. Required
        when the authenticated session is not already bound to exactly one
        active school.
      schema:
        type: string
        format: uuid
    SchoolId:
      name: schoolId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    PerPage:
      name: per_page
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 25
    StatusFilter:
      name: status
      in: query
      schema:
        type: string
    Sort:
      name: sort
      in: query
      description: Comma-separated field names; prefix with '-' for descending.
      schema:
        type: string
  responses:
    Unauthorized:
      description: Authentication is missing or invalid
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Forbidden:
      description: The authenticated user lacks permission for this action
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    TenantMismatch:
      description: Tenant context is missing, inactive, or outside permitted scope
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    NotFound:
      description: Resource was not found in the permitted scope
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    ValidationError:
      description: Validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
  schemas:
    SuccessEnvelope:
      type: object
      required: [data, meta]
      properties:
        data: {}
        meta:
          type: object
          additionalProperties: true
    PaginatedEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          required: [data, meta]
          properties:
            data:
              type: array
              items: {}
            meta:
              type: object
              required: [page, per_page, total]
              properties:
                page:
                  type: integer
                per_page:
                  type: integer
                total:
                  type: integer
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              examples: [validation_failed, forbidden, tenant_mismatch]
            message:
              type: string
            details:
              type: object
              additionalProperties: true
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        school_id:
          type:
            - string
            - 'null'
          format: uuid
    AuthSession:
      type: object
      required: [token, user, roles, permissions]
      properties:
        token:
          type: string
        user:
          $ref: '#/components/schemas/User'
        resolved_school:
          oneOf:
            - $ref: '#/components/schemas/School'
            - type: 'null'
        roles:
          type: array
          items:
            $ref: '#/components/schemas/Role'
        permissions:
          type: array
          items:
            $ref: '#/components/schemas/Permission'
    Scope:
      type: string
      enum: [platform, school]
    Status:
      type: string
      enum: [active, inactive]
    AcademicStatus:
      type: string
      enum: [planned, active, closed, inactive]
    School:
      type: object
      required: [id, name, code, status]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        code:
          type: string
        status:
          $ref: '#/components/schemas/Status'
        contact_email:
          type:
            - string
            - 'null'
          format: email
        contact_phone:
          type:
            - string
            - 'null'
        address_summary:
          type:
            - string
            - 'null'
    SchoolCreateRequest:
      type: object
      required: [name, code]
      properties:
        name:
          type: string
        code:
          type: string
        contact_email:
          type: string
          format: email
        contact_phone:
          type: string
        address_summary:
          type: string
    SchoolUpdateRequest:
      type: object
      properties:
        name:
          type: string
        status:
          $ref: '#/components/schemas/Status'
        contact_email:
          type: string
          format: email
        contact_phone:
          type: string
        address_summary:
          type: string
    User:
      type: object
      required: [id, full_name, email, status, roles]
      properties:
        id:
          type: string
          format: uuid
        school_id:
          type:
            - string
            - 'null'
          format: uuid
        full_name:
          type: string
        email:
          type: string
          format: email
        status:
          $ref: '#/components/schemas/Status'
        roles:
          type: array
          items:
            $ref: '#/components/schemas/Role'
    UserCreateRequest:
      type: object
      required: [full_name, email, role_ids]
      properties:
        school_id:
          type: string
          format: uuid
        full_name:
          type: string
        email:
          type: string
          format: email
        role_ids:
          type: array
          items:
            type: string
            format: uuid
    Role:
      type: object
      required: [id, scope, name, status, permissions]
      properties:
        id:
          type: string
          format: uuid
        school_id:
          type:
            - string
            - 'null'
          format: uuid
        scope:
          $ref: '#/components/schemas/Scope'
        name:
          type: string
        status:
          $ref: '#/components/schemas/Status'
        permissions:
          type: array
          items:
            $ref: '#/components/schemas/Permission'
    RoleCreateRequest:
      type: object
      required: [scope, name, permission_ids]
      properties:
        school_id:
          type: string
          format: uuid
        scope:
          $ref: '#/components/schemas/Scope'
        name:
          type: string
        permission_ids:
          type: array
          items:
            type: string
            format: uuid
    Permission:
      type: object
      required: [id, code, name, scope, status]
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
        name:
          type: string
        scope:
          $ref: '#/components/schemas/Scope'
        status:
          $ref: '#/components/schemas/Status'
    AcademicYear:
      type: object
      required: [id, school_id, name, start_date, end_date, status]
      properties:
        id:
          type: string
          format: uuid
        school_id:
          type: string
          format: uuid
        name:
          type: string
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
        status:
