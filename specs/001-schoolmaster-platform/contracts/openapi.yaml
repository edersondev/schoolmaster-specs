openapi: 3.1.0
info:
  title: SchoolMaster API
  version: 0.1.0
  summary: Repository-level aggregate publication target for the SchoolMaster platform API.
  description: |
    This OpenAPI document is the contract between the SchoolMaster frontend and backend repositories once feature contracts are promoted into the aggregate. The target implementations are a Laravel API and a Vue 3 SPA. Approved feature-level contracts live under specs/*/contracts/ before promotion into this repository-level aggregate.
servers:
  - url: /
    description: API origin; promoted paths include the /api/v1 version prefix
security:
  - bearerAuth: []
tags:
  - name: Auth
    description: Authentication and current-session operations.
  - name: Schools
    description: Platform-level school tenant provisioning and review.
  - name: Users
    description: Tenant-aware user account administration.
  - name: Roles
    description: Platform and school role management.
  - name: Permissions
    description: Permission definitions exposed through scoped roles.
  - name: Academic Years
    description: School-owned academic year management.
  - name: Academic Periods
    description: Periods inside academic years for academic operations.
  - name: Guardians
    description: Guardian records linked to student profiles.
  - name: Guardian Self-Service
    description: Read-only guardian access to approved student information.
  - name: Student Profiles
    description: School-scoped student profile and enrollment lifecycle management.
  - name: Teacher Content
    description: Teacher-managed folders and instructional content.
  - name: Questionnaires
    description: Teacher-authored instructional questionnaires.
  - name: Assessment Responses
    description: Student submissions, scan-gated files, review, grading, and safe summaries.
  - name: Learning Sets
    description: Ordered instructional sequences for student use.
  - name: Grades
    description: Student grade records in permitted scope.
  - name: Attendance
    description: Student attendance records in permitted scope.
  - name: Reports
    description: Tenant-scoped report requests, lifecycle, definitions, catalog, and outputs.
  - name: Platform Support
    description: Platform-wide operational summaries, support access decisions, diagnostics, and audit review.
  - name: Account Lifecycle
    description: Account invitation, password setup, password reset, lock, recovery, and reactivation workflows.
  - name: Class Sections
    description: School-owned ClassSection/Roster structures for academic-period-scoped teaching organization.
  - name: Roster Memberships
    description: School-owned roster membership administration with all-or-nothing batch changes.
  - name: Teacher Assignments
    description: School-owned teacher assignment administration and teacher own-active-assignment reads.
paths:
  /api/v1/auth/login:
    post:
      tags:
        - Auth
      summary: Authenticate a user in platform or school context
      description: Successful bearer tokens expire 8 hours after issuance. Inactive users and inactive school contexts cannot authenticate or continue protected workflows.
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authentication succeeded
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AuthSession'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
        '429':
          $ref: '#/components/responses/AuthLockout'
  /api/v1/auth/me:
    get:
      tags:
        - Auth
      summary: Return the authenticated user, resolved tenant, roles, and permissions
      operationId: getCurrentUser
      parameters:
        - $ref: '#/components/parameters/TenantContext'
      responses:
        '200':
          description: Current authenticated session
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AuthSession'
        '401':
          $ref: '#/components/responses/TokenRejected'
        '403':
          $ref: '#/components/responses/TenantMismatch'
  /api/v1/auth/logout:
    post:
      tags:
        - Auth
      summary: Revoke the current bearer token
      description: Revokes continued access for the bearer token used on the request. Already expired, revoked, inactive-user, or inactive-school tokens return the token rejection envelope.
      operationId: logout
      responses:
        '200':
          description: Logout succeeded and the current bearer token was revoked
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/LogoutResult'
        '401':
          $ref: '#/components/responses/TokenRejected'
  /api/v1/account-invitations:
    post:
      tags:
        - Account Lifecycle
      summary: Create or replace an account invitation
      description: Creates a 7-day single-use invitation for an eligible platform or same-school user. The response never exposes reusable invitation token secrets. Creating a new invitation supersedes prior unused invitations for the same user and scope.
      operationId: createAccountInvitation
      parameters:
        - $ref: '#/components/parameters/TenantContext'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountInvitationCreateRequest'
      responses:
        '201':
          description: Invitation created or replaced
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AccountInvitation'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/AccountLifecycleForbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/v1/account-invitations/{invitationToken}/resend:
    post:
      tags:
        - Account Lifecycle
      summary: Resend or replace an invitation
      description: Requests new email delivery metadata for an existing pending invitation and rotates the single-use token. Resends are limited to 3 sends or resends per user and scope within 24 hours.
      operationId: resendAccountInvitation
      parameters:
        - $ref: '#/components/parameters/TenantContext'
        - $ref: '#/components/parameters/InvitationToken'
      responses:
        '200':
          description: Invitation was replaced and delivery metadata was recorded
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AccountInvitation'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/AccountLifecycleForbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/v1/account-invitations/{invitationToken}/setup:
    post:
      tags:
        - Account Lifecycle
      summary: Complete invitation and initial password setup
      description: Completes first password setup with a valid unexpired single-use invitation token. Failed completion attempts revoke the invitation after 5 failures per invitation, account, or IP within 15 minutes.
      operationId: completeAccountInvitation
      security: []
      parameters:
        - $ref: '#/components/parameters/InvitationToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordSetupRequest'
      responses:
        '200':
          description: Invitation completed and password setup was accepted
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AccountLifecycleResult'
        '401':
          $ref: '#/components/responses/TokenInvalid'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/v1/auth/password-reset-requests:
    post:
      tags:
        - Account Lifecycle
      summary: Request password reset with non-enumerating response
      description: Always returns the same accepted envelope for eligible, missing, inactive, locked, deleted, unauthorized, and over-limit identifiers. Requests beyond 3 per account or IP within 1 hour create no reset token and no email delivery request.
      operationId: requestPasswordReset
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetRequestCreateRequest'
      responses:
        '202':
          description: Reset request accepted without revealing account state
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PasswordResetRequestResult'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/v1/auth/password-resets:
    post:
      tags:
        - Account Lifecycle
      summary: Complete password reset
      description: Completes credential replacement with a valid unexpired single-use reset token. Successful completion revokes all active bearer tokens for the affected user.
      operationId: completePasswordReset
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetCompletionRequest'
      responses:
        '200':
          description: Password reset completed
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AccountLifecycleResult'
        '401':
          $ref: '#/components/responses/TokenInvalid'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/v1/users/{userId}/account-lock:
    get:
      tags:
        - Account Lifecycle
      summary: Review account lock state
      operationId: getAccountLock
      parameters:
        - $ref: '#/components/parameters/TenantContext'
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: Account lock state
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AccountLock'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/AccountLifecycleForbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags:
        - Account Lifecycle
      summary: Administratively lock an account
      description: Administrative locks remain active until an authorized unlock or recovery action clears them and revoke all active bearer tokens for the affected user.
      operationId: lockAccount
      parameters:
        - $ref: '#/components/parameters/TenantContext'
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountLockRequest'
      responses:
        '200':
          description: Account locked
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AccountLock'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/AccountLifecycleForbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
    delete:
      tags:
        - Account Lifecycle
      summary: Unlock or clear administrative account lock
      operationId: unlockAccount
      parameters:
        - $ref: '#/components/parameters/TenantContext'
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: Account lock cleared
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AccountLifecycleResult'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/AccountLifecycleForbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /api/v1/users/{userId}/account-reactivation:
    post:
      tags:
        - Account Lifecycle
      summary: Recover or reactivate an eligible account
      description: Reactivation validates user lifecycle state, school lifecycle state, active role assignments, password setup state, lock state, and tenant or platform scope before authentication may resume.
      operationId: reactivateAccount
      parameters:
        - $ref: '#/components/parameters/TenantContext'
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountRecoveryRequest'
      responses:
        '200':
          description: Account recovery or reactivation completed
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AccountLifecycleResult'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/AccountLifecycleForbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/v1/schools:
    get:
      tags:
        - Schools
      summary: List schools visible to the requester
      operationId: listSchools
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
        - $ref: '#/components/parameters/StatusFilter'
        - $ref: '#/components/parameters/Sort'
      responses:
        '200':
          description: School collection
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/School'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags:
        - Schools
      summary: Create a school tenant
      operationId: createSchool
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SchoolCreateRequest'
      responses:
        '201':
          description: School created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/School'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/v1/schools/{schoolId}:
    get:
      tags:
        - Schools
      summary: Review one school tenant
      operationId: getSchool
      parameters:
        - $ref: '#/components/parameters/SchoolId'
      responses:
        '200':
          description: School detail
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/School'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags:
        - Schools
      summary: Update school profile or operational status
      operationId: updateSchool
      parameters:
        - $ref: '#/components/parameters/SchoolId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SchoolUpdateRequest'
      responses:
        '200':
          description: School updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/School'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
    delete:
      tags:
        - Schools
      summary: Soft delete a school tenant
      operationId: deleteSchool
      parameters:
        - $ref: '#/components/parameters/SchoolId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LifecycleActionRequest'
      responses:
        '200':
          description: School soft deleted
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/LifecycleOutcome'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/v1/schools/{schoolId}/activate:
    post:
      tags:
        - Schools
      summary: Activate a school tenant
      operationId: activateSchool
      parameters:
        - $ref: '#/components/parameters/SchoolId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LifecycleActionRequest'
      responses:
        '200':
          description: School activated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/LifecycleOutcome'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/v1/schools/{schoolId}/deactivate:
    post:
      tags:
        - Schools
      summary: Deactivate a school tenant
      operationId: deactivateSchool
      parameters:
        - $ref: '#/components/parameters/SchoolId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LifecycleActionRequest'
      responses:
        '200':
          description: School deactivated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/LifecycleOutcome'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/v1/schools/{schoolId}/restore:
    post:
      tags:
        - Schools
      summary: Restore a soft-deleted school tenant
      operationId: restoreSchool
      parameters:
        - $ref: '#/components/parameters/SchoolId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LifecycleActionRequest'
      responses:
        '200':
          description: School restored
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/LifecycleOutcome'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/v1/users:
    get:
      tags:
        - Users
      summary: List users in permitted scope
      operationId: listUsers
      parameters:
        - $ref: '#/components/parameters/TenantContext'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
        - $ref: '#/components/parameters/StatusFilter'
        - $ref: '#/components/parameters/Sort'
      responses:
        '200':
          description: User collection
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/User'
        '403':
          $ref: '#/components/responses/TenantMismatch'
    post:
      tags:
        - Users
      summary: Create a user inside the permitted scope
      operationId: createUser
      parameters:
        - $ref: '#/components/parameters/TenantContext'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreateRequest'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/User'
        '403':
          $ref: '#/components/responses/TenantMismatch'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/v1/users/{userId}:
    get:
      tags:
        - Users
      summary: Retrieve a user in permitted scope
      operationId: getUser
      parameters:
        - $ref: '#/components/parameters/TenantContext'
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: User detail
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/AdministrationForbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags:
        - Users
      summary: Update documented user fields
      operationId: updateUser
      parameters:
        - $ref: '#/components/parameters/TenantContext'
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdateRequest'
      responses:
        '200':
          description: User updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/AdministrationForbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
    delete:
      tags:
        - Users
      summary: Soft delete a user
      operationId: deleteUser
      parameters:
        - $ref: '#/components/parameters/TenantContext'
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LifecycleActionRequest'
      responses:
        '200':
          description: User soft deleted
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/LifecycleOutcome'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/AdministrationForbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/v1/users/{userId}/activate:
    post:
      tags:
        - Users
      summary: Activate a user
      operationId: activateUser
      parameters:
        - $ref: '#/components/parameters/TenantContext'
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LifecycleActionRequest'
      responses:
        '200':
          description: User activated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/LifecycleOutcome'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
