  responses:
    Unauthorized:
      description: Authentication is missing or invalid
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    ValidationError:
      description: Validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    AuthLockout:
      description: Login is locked after 5 failed attempts for either submitted email or source IP within 15 minutes
      headers:
        Retry-After:
          description: Seconds until another login attempt may be accepted.
          schema:
            type: integer
            minimum: 1
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    TokenRejected:
      description: Bearer token is expired, revoked, or tied to an inactive user or inactive school
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    TenantMismatch:
      description: Tenant context is missing, inactive, or outside permitted scope
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    AccountLifecycleForbidden:
      description: Account lifecycle access is forbidden because tenant context is missing, inactive, or outside permitted scope, or because the actor lacks platform account administration or same-school user administration permission.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          examples:
            tenantMismatch:
              summary: Tenant context is invalid for a school-scoped account lifecycle operation
              value:
                error:
                  code: tenant_mismatch
                  message: Tenant context is missing, inactive, or outside permitted scope.
            insufficientPermission:
              summary: Actor lacks account lifecycle permission in an otherwise valid scope
              value:
                error:
                  code: forbidden
                  message: The authenticated user lacks permission for this action.
    Conflict:
      description: Request conflicts with an existing identifier or incompatible lifecycle state
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    NotFound:
      description: Resource was not found in the permitted scope
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    TokenInvalid:
      description: Lifecycle token is expired, reused, superseded, revoked, malformed, missing, mismatched, or scope-incompatible
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Forbidden:
      description: The authenticated user lacks permission for this action
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    AdministrationForbidden:
      description: Administration lifecycle access is forbidden because the tenant context is missing, inactive, or outside permitted scope, or because the authenticated user lacks the required platform or school administration permission.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          examples:
            tenantMismatch:
              summary: Tenant context is invalid for this school-scoped operation
              value:
                error:
                  code: tenant_mismatch
                  message: Tenant context is missing, inactive, or outside permitted scope.
            insufficientPermission:
              summary: Scope is valid but the actor lacks administration lifecycle permission
              value:
                error:
                  code: forbidden
                  message: The authenticated user lacks permission for this action.
    StudentProfileForbidden:
      description: Student profile access is forbidden because the tenant context is missing, inactive, or outside permitted scope, or because the authenticated user lacks student profile administration permission in an otherwise valid school context.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          examples:
            tenantMismatch:
              summary: Tenant context is invalid for this school-scoped operation
              value:
                error:
                  code: tenant_mismatch
                  message: Tenant context is missing, inactive, or outside permitted scope.
            insufficientPermission:
              summary: Tenant context is valid but the actor lacks student profile administration permission
              value:
                error:
                  code: forbidden
                  message: The authenticated user lacks permission for this action.
    TeacherWorkflowForbidden:
      description: Tenant context is missing, inactive, or outside permitted scope, or the authenticated user lacks the required teacher workflow permission.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    AssessmentValidation:
      description: Advanced assessment validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    AssessmentForbidden:
      description: Actor lacks same-school assessment authority
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    ScanPending:
      description: Answer file is pending malware scan and unavailable
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    ScanFailed:
      description: Answer file failed malware scan and remains unavailable
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    UnavailableFile:
      description: Answer file is unavailable for this actor or state
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    OutputExpired:
      description: Generated report output file has expired; request a new ReportRun with the same filters
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    ClassroomRosterForbidden:
      description: Classroom roster access is forbidden because tenant context is missing, inactive, or outside permitted scope, or because the authenticated actor lacks school-administrator permission or teacher own-active-assignment read permission in an otherwise valid school context.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          examples:
            tenantMismatch:
              summary: Tenant context is invalid for this school-scoped operation
              value:
                error:
                  code: tenant_mismatch
                  message: Tenant context is missing, inactive, or outside permitted scope.
            insufficientPermission:
              summary: Scope is valid but the actor lacks roster permission
              value:
                error:
                  code: forbidden
                  message: The authenticated user lacks permission for this action.
            teacherAssignmentDenied:
              summary: Teacher attempted to read another teacher's assignment
              value:
                error:
                  code: forbidden
                  message: Teachers may read only their own active assignments.
    PlatformSupportForbidden:
      description: Platform support access is forbidden because the authenticated actor lacks the required platform/support permission or approval gate.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    PlatformSupportConflict:
      description: Support access is stale, expired, revoked, mismatched, missing an approval gate, or concurrently changed.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
