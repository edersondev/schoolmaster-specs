        - Class Sections
      summary: Inactivate a class section
      description: Inactivates an active ClassSection/Roster only when no active roster memberships or active teacher assignments exist. A reason and today-or-past effective date inside the academic period are required. Reactivation is not supported in v1.
      operationId: updateClassSectionStatus
      parameters:
        - $ref: '#/components/parameters/TenantContext'
        - $ref: '#/components/parameters/ClassSectionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClassSectionStatusUpdateRequest'
      responses:
        '200':
          description: Class section status updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClassSectionEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/ClassroomRosterForbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/v1/class-sections/{classSectionId}/memberships:
    get:
      tags:
        - Roster Memberships
      summary: List roster memberships
      description: Returns school-scoped membership history for the target class section. Supports pagination plus academicPeriodId and status filters only.
      operationId: listClassSectionMemberships
      parameters:
        - $ref: '#/components/parameters/TenantContext'
        - $ref: '#/components/parameters/ClassSectionId'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
        - $ref: '#/components/parameters/ClassroomRosterAcademicPeriodFilter'
        - $ref: '#/components/parameters/RosterMembershipStatusFilter'
      responses:
        '200':
          description: Paginated roster memberships
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RosterMembershipPaginatedEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/ClassroomRosterForbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
    post:
      tags:
        - Roster Memberships
      summary: Add roster memberships as an all-or-nothing batch
      description: Adds up to 100 active same-school student profiles to the roster. Every student must be active, not deleted or transferred, and have active same-school enrollment covering the explicit effective start date. Any invalid member rejects the whole request without partial changes.
      operationId: batchAddClassSectionMemberships
      parameters:
        - $ref: '#/components/parameters/TenantContext'
        - $ref: '#/components/parameters/ClassSectionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RosterMembershipBatchAddRequest'
      responses:
        '201':
          description: Membership batch created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RosterMembershipBatchEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/ClassroomRosterForbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
    patch:
      tags:
        - Roster Memberships
      summary: End roster memberships as an all-or-nothing batch
      description: Ends up to 100 active memberships. A reason and today-or-past effective end date inside the academic period are required; the end date must be on or after each membership effective start date. Any invalid membership rejects the whole request.
      operationId: batchEndClassSectionMemberships
      parameters:
        - $ref: '#/components/parameters/TenantContext'
        - $ref: '#/components/parameters/ClassSectionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RosterMembershipBatchEndRequest'
      responses:
        '200':
          description: Membership batch ended
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RosterMembershipBatchEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/ClassroomRosterForbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/v1/teacher-assignments:
    get:
      tags:
        - Teacher Assignments
      summary: List teacher assignments
      description: School administrators can list same-school teacher assignments. Teachers can list only their own active assignments. Supports pagination plus academicPeriodId and status filters only.
      operationId: listTeacherAssignments
      parameters:
        - $ref: '#/components/parameters/TenantContext'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
        - $ref: '#/components/parameters/ClassroomRosterAcademicPeriodFilter'
        - $ref: '#/components/parameters/TeacherAssignmentStatusFilter'
      responses:
        '200':
          description: Paginated teacher assignments visible to the actor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeacherAssignmentPaginatedEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/ClassroomRosterForbidden'
        '422':
          $ref: '#/components/responses/ValidationError'
    post:
      tags:
        - Teacher Assignments
      summary: Create a teacher assignment
      description: Assigns an active same-school teacher-compatible user to an active class section for an active compatible academic period. The teacher-compatible role must be active on the explicit effective start date. Duplicate active assignments are rejected.
      operationId: createTeacherAssignment
      parameters:
        - $ref: '#/components/parameters/TenantContext'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TeacherAssignmentCreateRequest'
      responses:
        '201':
          description: Teacher assignment created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeacherAssignmentEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/ClassroomRosterForbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/v1/teacher-assignments/{teacherAssignmentId}:
    get:
      tags:
        - Teacher Assignments
      summary: Get a teacher assignment
      description: School administrators can read same-school assignment details. Teachers can retrieve only their own active assignment detail.
      operationId: getTeacherAssignment
      parameters:
        - $ref: '#/components/parameters/TenantContext'
        - $ref: '#/components/parameters/TeacherAssignmentId'
      responses:
        '200':
          description: Teacher assignment detail visible to the actor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeacherAssignmentEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/ClassroomRosterForbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/v1/teacher-assignments/{teacherAssignmentId}/status:
    patch:
      tags:
        - Teacher Assignments
      summary: Deactivate a teacher assignment
      description: Deactivates an active teacher assignment. A reason and today-or-past effective end date inside the academic period are required; the end date must be on or after the assignment effective start date.
      operationId: updateTeacherAssignmentStatus
      parameters:
        - $ref: '#/components/parameters/TenantContext'
        - $ref: '#/components/parameters/TeacherAssignmentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TeacherAssignmentStatusUpdateRequest'
      responses:
        '200':
          description: Teacher assignment deactivated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeacherAssignmentEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/ClassroomRosterForbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/v1/platform/schools:
    get:
      tags:
        - Platform Support
      summary: List minimized platform school summaries
      description: Returns platform-wide school operational summaries with documented filters, pagination, sorting, small-count suppression, and no school-owned detail records.
      operationId: listPlatformSchoolSummaries
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
        - $ref: '#/components/parameters/Sort'
        - name: status
          in: query
          schema:
            type: string
            enum:
              - active
              - inactive
        - name: search
          in: query
          schema:
            type: string
            minLength: 1
            maxLength: 120
      responses:
        '200':
          description: Minimized platform school summaries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlatformSchoolSummaryPaginatedEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PlatformSupportForbidden'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/v1/platform/reporting/overview:
    get:
      tags:
        - Platform Support
      summary: Get cross-school reporting overview
      description: Returns approved aggregate reporting health and lifecycle indicators without raw report outputs, generated files, or school-owned detail records.
      operationId: getPlatformReportingOverview
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
        - $ref: '#/components/parameters/Sort'
      responses:
        '200':
          description: Platform reporting overview
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlatformReportingOverviewEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PlatformSupportForbidden'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/v1/platform/support-access:
    post:
      tags:
        - Platform Support
      summary: Request target-school support access
      description: Creates or evaluates a minimized support access decision for exactly one target school using documented reason, purpose, correlation metadata, and target-school opt-in state.
      operationId: requestSupportAccess
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SupportAccessRequest'
      responses:
        '201':
          description: Support access decision created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SupportAccessDecisionEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PlatformSupportForbidden'
        '409':
          $ref: '#/components/responses/PlatformSupportConflict'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/v1/platform/support-access/{supportAccessId}:
    get:
      tags:
        - Platform Support
      summary: Get support access decision detail
      operationId: getSupportAccessDecision
      parameters:
        - $ref: '#/components/parameters/SupportAccessId'
      responses:
        '200':
          description: Support access decision
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SupportAccessDecisionEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PlatformSupportForbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/v1/platform/support-access/{supportAccessId}/approve:
    post:
      tags:
        - Platform Support
      summary: Approve support access
      description: Records internal platform approval only when the matching target-school opt-in and support decision gates are valid.
      operationId: approveSupportAccess
      parameters:
        - $ref: '#/components/parameters/SupportAccessId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SupportAccessTransitionRequest'
      responses:
        '200':
          description: Support access approved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SupportAccessDecisionEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PlatformSupportForbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/PlatformSupportConflict'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/v1/platform/support-access/{supportAccessId}/revoke:
    post:
      tags:
        - Platform Support
      summary: Revoke support access
      operationId: revokeSupportAccess
      parameters:
        - $ref: '#/components/parameters/SupportAccessId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SupportAccessTransitionRequest'
      responses:
        '200':
          description: Support access revoked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SupportAccessDecisionEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PlatformSupportForbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/PlatformSupportConflict'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/v1/platform/support/schools/{schoolId}/diagnostics:
    get:
      tags:
        - Platform Support
      summary: Get redacted support diagnostics for one school
      description: Returns redacted read-only diagnostics for one target school only when target-school opt-in and internal platform approval gates are valid and no older than 24 hours.
      operationId: getSupportSchoolDiagnostics
      parameters:
        - $ref: '#/components/parameters/SchoolId'
        - name: support_access_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Redacted support diagnostics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SupportSchoolDiagnosticsEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PlatformSupportForbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/PlatformSupportConflict'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/v1/platform/support-audit-events:
    get:
      tags:
        - Platform Support
      summary: List minimized support audit events
      operationId: listSupportAuditEvents
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
        - name: action
          in: query
          schema:
            type: string
            maxLength: 80
        - name: outcome
          in: query
          schema:
            type: string
            enum:
              - allowed
              - denied
              - validation_failed
              - conflicted
              - expired
              - revoked
        - name: correlation_id
          in: query
          schema:
            type: string
            maxLength: 120
      responses:
        '200':
          description: Minimized support audit events
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SupportAuditEventPaginatedEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PlatformSupportForbidden'
        '422':
          $ref: '#/components/responses/ValidationError'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: token
  schemas:
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        school_id:
          type:
            - string
            - 'null'
          format: uuid
    SuccessEnvelope:
      type: object
      required:
        - data
        - meta
      properties:
        data: {}
        meta:
          type: object
          additionalProperties: true
    Status:
      type: string
      enum:
        - active
        - inactive
    Scope:
      type: string
      enum:
        - platform
        - school
    Permission:
      type: object
      required:
        - id
        - code
        - name
        - scope
        - status
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
        name:
          type: string
        scope:
          $ref: '#/components/schemas/Scope'
        status:
          $ref: '#/components/schemas/Status'
    Role:
      type: object
      required:
        - id
        - scope
        - name
        - status
        - permissions
      properties:
        id:
          type: string
          format: uuid
        school_id:
          type:
            - string
            - 'null'
          format: uuid
        scope:
          $ref: '#/components/schemas/Scope'
        name:
          type: string
        status:
          $ref: '#/components/schemas/Status'
        permissions:
          type: array
          items:
            $ref: '#/components/schemas/Permission'
    User:
      type: object
      required:
        - id
        - full_name
        - email
        - status
        - roles
      properties:
        id:
          type: string
          format: uuid
        school_id:
          type:
            - string
            - 'null'
          format: uuid
        full_name:
          type: string
        email:
          type: string
          format: email
        status:
          $ref: '#/components/schemas/Status'
        roles:
          type: array
          items:
            $ref: '#/components/schemas/Role'
    Address:
      type: object
      additionalProperties: false
      required:
        - id
        - street
        - number
        - neighborhood
        - city
        - state
        - zip_code
      properties:
        id:
          type: string
          format: uuid
        street:
          type: string
        number:
          type: string
          pattern: '^[0-9]+$'
        complement:
          type:
            - string
            - 'null'
        neighborhood:
          type: string
        city:
          type: string
        state:
          type: string
        zip_code:
          type: string
          pattern: '^[0-9]+$'
        country:
          type:
            - string
            - 'null'
    AddressInput:
      type: object
      additionalProperties: false
      required:
        - street
        - number
        - neighborhood
        - city
        - state
        - zip_code
      properties:
        street:
          type: string
        number:
          type: string
          pattern: '^[0-9]+$'
        complement:
          type:
            - string
            - 'null'
        neighborhood:
          type: string
        city:
          type: string
        state:
          type: string
        zip_code:
          type: string
          pattern: '^[0-9]+$'
        country:
          type:
            - string
            - 'null'
    School:
      type: object
      required:
        - id
        - name
        - code
        - status
        - address
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        code:
          type: string
        status:
          $ref: '#/components/schemas/Status'
        contact_email:
          type:
            - string
            - 'null'
          format: email
        contact_phone:
          type:
            - string
            - 'null'
        address:
          oneOf:
            - $ref: '#/components/schemas/Address'
            - type: 'null'
    AuthSession:
      type: object
      required:
        - token
        - token_expires_at
        - user
        - roles
        - permissions
      properties:
        token:
          type: string
        token_expires_at:
          type: string
          format: date-time
          description: Bearer token expiration timestamp, 8 hours after issuance.
        user:
          $ref: '#/components/schemas/User'
        resolved_school:
          oneOf:
            - $ref: '#/components/schemas/School'
            - type: 'null'
        roles:
          type: array
          items:
            $ref: '#/components/schemas/Role'
        permissions:
          type: array
          items:
            $ref: '#/components/schemas/Permission'
    ErrorEnvelope:
      type: object
      required:
        - error
      properties:
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: string
              examples:
                - validation_failed
                - forbidden
                - tenant_mismatch
                - auth_locked
                - token_expired
                - token_revoked
                - inactive_user
                - inactive_school
            message:
              type: string
            details:
              type: object
              additionalProperties: true
    LogoutResult:
      type: object
      required:
        - revoked
      properties:
        revoked:
          type: boolean
          description: Indicates the current bearer token was revoked by logout.
    AccountInvitationCreateRequest:
      type: object
      additionalProperties: false
      required:
        - scope
        - full_name
        - email
        - role_ids
      properties:
        scope:
          type: string
          enum:
            - platform
            - school
        school_id:
          type:
            - string
            - 'null'
          format: uuid
        full_name:
          type: string
          minLength: 1
          maxLength: 255
        email:
          type: string
          format: email
          maxLength: 255
        role_ids:
          type: array
          minItems: 1
          items:
            type: string
            format: uuid
        delivery_metadata:
          type: object
          additionalProperties: true
    AccountInvitation:
      type: object
      required:
        - id
        - user_id
        - scope
        - status
        - expires_at
        - delivery_channel
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        school_id:
          type:
            - string
            - 'null'
          format: uuid
        scope:
          type: string
          enum:
            - platform
            - school
        status:
          type: string
          enum:
            - pending
            - completed
            - expired
            - superseded
            - revoked
        expires_at:
          type: string
          format: date-time
        completed_at:
          type:
            - string
            - 'null'
          format: date-time
        delivery_channel:
          type: string
          enum:
            - email
        delivery_requested_at:
          type:
            - string
            - 'null'
          format: date-time
    PasswordSetupRequest:
      type: object
      additionalProperties: false
      required:
        - password
      properties:
        password:
          type: string
          minLength: 12
          maxLength: 128
          description: Passwords shorter than 12 characters, longer than 128 characters, or found in the common-password blocklist are rejected. Paste and password managers must be allowed by clients.
    AccountLifecycleResult:
      type: object
      required:
        - user_id
        - status
        - action
      properties:
        user_id:
          type: string
          format: uuid
        school_id:
          type:
            - string
            - 'null'
          format: uuid
        status:
          type: string
        action:
          type: string
    PasswordResetRequestCreateRequest:
      type: object
      additionalProperties: false
      required:
        - email
      properties:
        email:
          type: string
          format: email
          maxLength: 255
        school_id:
          type:
            - string
            - 'null'
          format: uuid
        delivery_metadata:
          type: object
          additionalProperties: true
    PasswordResetRequestResult:
      type: object
      required:
        - accepted
      properties:
        accepted:
          type: boolean
          const: true
    PasswordResetCompletionRequest:
      type: object
      additionalProperties: false
      required:
        - token
        - password
      properties:
        token:
          type: string
          minLength: 32
          maxLength: 255
        password:
          type: string
          minLength: 12
          maxLength: 128
    AccountLock:
      type: object
      required:
        - user_id
        - status
      properties:
        id:
          type:
            - string
            - 'null'
          format: uuid
        user_id:
          type: string
          format: uuid
        school_id:
          type:
            - string
            - 'null'
          format: uuid
        lock_type:
          type:
            - string
            - 'null'
          enum:
            - administrative
            - failed_login
            - recovery_hold
            - null
        status:
          type: string
          enum:
            - active
            - cleared
            - none
        reason:
          type:
            - string
            - 'null'
        locked_at:
          type:
            - string
            - 'null'
          format: date-time
        cleared_at:
          type:
            - string
            - 'null'
          format: date-time
    AccountLockRequest:
      type: object
      additionalProperties: false
      required:
        - reason
      properties:
        reason:
          type: string
          minLength: 1
          maxLength: 500
    AccountRecoveryRequest:
