  /api/v1/class-sections:
    get:
      tags:
      - Class Sections
      summary: List school-owned class sections
      description: Returns only ClassSection/Roster records in the resolved active school context. Supports pagination plus academicPeriodId and status filters only; include expansion, sort behavior, and other filters are rejected.
      operationId: listClassSections
      parameters:
      - $ref: '#/components/parameters/TenantContext'
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/PerPage'
      - $ref: '#/components/parameters/ClassroomRosterAcademicPeriodFilter'
      - $ref: '#/components/parameters/ClassSectionStatusFilter'
      responses:
        '200':
          description: Paginated class sections visible in the resolved school context
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClassSectionPaginatedEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/ClassroomRosterForbidden'
        '422':
          $ref: '#/components/responses/ValidationError'
    post:
      tags:
      - Class Sections
      summary: Create a school-owned class section
      description: Creates an active ClassSection/Roster for the resolved school and active compatible academic period. Code is unique per school and academic period; names may repeat. Creation as inactive, unsupported metadata fields, cross-tenant references, and duplicate codes are rejected.
      operationId: createClassSection
      parameters:
      - $ref: '#/components/parameters/TenantContext'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClassSectionCreateRequest'
      responses:
        '201':
          description: Class section created as active
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClassSectionEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/ClassroomRosterForbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/v1/class-sections/{classSectionId}:
    get:
      tags:
      - Class Sections
      summary: Get a school-owned class section
      operationId: getClassSection
      parameters:
      - $ref: '#/components/parameters/TenantContext'
      - $ref: '#/components/parameters/ClassSectionId'
      responses:
        '200':
          description: Class section detail in the resolved school context
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClassSectionEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/ClassroomRosterForbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags:
      - Class Sections
      summary: Update class-section metadata
      description: Updates documented code, name, and structured course/classroom/section/group metadata only. Status changes use the status operation; inactive reactivation is not supported in v1.
      operationId: updateClassSection
      parameters:
      - $ref: '#/components/parameters/TenantContext'
      - $ref: '#/components/parameters/ClassSectionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClassSectionUpdateRequest'
      responses:
        '200':
          description: Class section updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClassSectionEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/ClassroomRosterForbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/v1/class-sections/{classSectionId}/status:
    patch:
      tags:
      - Class Sections
      summary: Inactivate a class section
      description: Inactivates an active ClassSection/Roster only when no active roster memberships or active teacher assignments exist. A reason and today-or-past effective date inside the academic period are required. Reactivation is not supported in v1.
      operationId: updateClassSectionStatus
      parameters:
      - $ref: '#/components/parameters/TenantContext'
      - $ref: '#/components/parameters/ClassSectionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClassSectionStatusUpdateRequest'
      responses:
        '200':
          description: Class section status updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClassSectionEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/ClassroomRosterForbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/v1/class-sections/{classSectionId}/memberships:
    get:
      tags:
      - Roster Memberships
      summary: List roster memberships
      description: Returns school-scoped membership history for the target class section. Supports pagination plus academicPeriodId and status filters only.
      operationId: listClassSectionMemberships
      parameters:
      - $ref: '#/components/parameters/TenantContext'
      - $ref: '#/components/parameters/ClassSectionId'
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/PerPage'
      - $ref: '#/components/parameters/ClassroomRosterAcademicPeriodFilter'
      - $ref: '#/components/parameters/RosterMembershipStatusFilter'
      responses:
        '200':
          description: Paginated roster memberships
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RosterMembershipPaginatedEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/ClassroomRosterForbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
    post:
      tags:
      - Roster Memberships
      summary: Add roster memberships as an all-or-nothing batch
      description: Adds up to 100 active same-school student profiles to the roster. Every student must be active, not deleted or transferred, and have active same-school enrollment covering the explicit effective start date. Any invalid member rejects the whole request without partial changes.
      operationId: batchAddClassSectionMemberships
      parameters:
      - $ref: '#/components/parameters/TenantContext'
      - $ref: '#/components/parameters/ClassSectionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RosterMembershipBatchAddRequest'
      responses:
        '201':
          description: Membership batch created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RosterMembershipBatchEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/ClassroomRosterForbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
    patch:
      tags:
      - Roster Memberships
      summary: End roster memberships as an all-or-nothing batch
      description: Ends up to 100 active memberships. A reason and today-or-past effective end date inside the academic period are required; the end date must be on or after each membership effective start date. Any invalid membership rejects the whole request.
      operationId: batchEndClassSectionMemberships
      parameters:
      - $ref: '#/components/parameters/TenantContext'
      - $ref: '#/components/parameters/ClassSectionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RosterMembershipBatchEndRequest'
      responses:
        '200':
          description: Membership batch ended
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RosterMembershipBatchEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/ClassroomRosterForbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/v1/teacher-assignments:
    get:
      tags:
      - Teacher Assignments
      summary: List teacher assignments
      description: School administrators can list same-school teacher assignments. Teachers can list only their own active assignments. Supports pagination plus academicPeriodId and status filters only.
      operationId: listTeacherAssignments
      parameters:
      - $ref: '#/components/parameters/TenantContext'
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/PerPage'
      - $ref: '#/components/parameters/ClassroomRosterAcademicPeriodFilter'
      - $ref: '#/components/parameters/TeacherAssignmentStatusFilter'
      responses:
        '200':
          description: Paginated teacher assignments visible to the actor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeacherAssignmentPaginatedEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/ClassroomRosterForbidden'
        '422':
          $ref: '#/components/responses/ValidationError'
    post:
      tags:
      - Teacher Assignments
      summary: Create a teacher assignment
      description: Assigns an active same-school teacher-compatible user to an active class section for an active compatible academic period. The teacher-compatible role must be active on the explicit effective start date. Duplicate active assignments are rejected.
      operationId: createTeacherAssignment
      parameters:
      - $ref: '#/components/parameters/TenantContext'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TeacherAssignmentCreateRequest'
      responses:
        '201':
          description: Teacher assignment created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeacherAssignmentEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/ClassroomRosterForbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/v1/teacher-assignments/{teacherAssignmentId}:
    get:
      tags:
      - Teacher Assignments
      summary: Get a teacher assignment
      description: School administrators can read same-school assignment details. Teachers can retrieve only their own active assignment detail.
      operationId: getTeacherAssignment
      parameters:
      - $ref: '#/components/parameters/TenantContext'
      - $ref: '#/components/parameters/TeacherAssignmentId'
      responses:
        '200':
          description: Teacher assignment detail visible to the actor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeacherAssignmentEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/ClassroomRosterForbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/v1/teacher-assignments/{teacherAssignmentId}/status:
    patch:
      tags:
      - Teacher Assignments
      summary: Deactivate a teacher assignment
      description: Deactivates an active teacher assignment. A reason and today-or-past effective end date inside the academic period are required; the end date must be on or after the assignment effective start date.
      operationId: updateTeacherAssignmentStatus
      parameters:
      - $ref: '#/components/parameters/TenantContext'
      - $ref: '#/components/parameters/TeacherAssignmentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TeacherAssignmentStatusUpdateRequest'
      responses:
        '200':
          description: Teacher assignment deactivated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeacherAssignmentEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/ClassroomRosterForbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
components:
  parameters:
    AcademicPeriodFilter:
      name: academic_period_id
      in: query
      schema:
        type: string
        format: uuid
    AcademicPeriodFilterRequired:
      name: academic_period_id
      in: query
      required: true
      schema:
        type: string
        format: uuid
    ContentItemId:
      name: contentItemId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ClassSectionId:
      name: classSectionId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    TeacherAssignmentId:
      name: teacherAssignmentId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    PerPage:
      name: per_page
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 25
    ReportRunId:
      name: reportRunId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    SchoolId:
      name: schoolId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    UserId:
      name: userId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    RoleId:
      name: roleId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    AcademicYearId:
      name: academicYearId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    AcademicPeriodId:
      name: academicPeriodId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    GuardianId:
      name: guardianId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    StudentProfileId:
      name: studentProfileId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    Sort:
      name: sort
      in: query
      description: Comma-separated field names; prefix with '-' for descending.
      schema:
        type: string
    StatusFilter:
      name: status
      in: query
      schema:
        type: string
    ClassroomRosterAcademicPeriodFilter:
      name: academicPeriodId
      in: query
      description: Optional academic-period filter. This is the only academic-period filter accepted by v1 classroom roster foundation list operations.
      schema:
        type: string
        format: uuid
    ClassSectionStatusFilter:
      name: status
      in: query
      description: Optional class-section status filter. Unsupported status values are rejected.
      schema:
        $ref: '#/components/schemas/ClassSectionStatus'
    RosterMembershipStatusFilter:
      name: status
      in: query
      description: Optional roster membership status filter. Unsupported status values are rejected.
      schema:
        $ref: '#/components/schemas/RosterMembershipStatus'
    TeacherAssignmentStatusFilter:
      name: status
      in: query
      description: Optional teacher assignment status filter. Unsupported status values are rejected.
      schema:
        $ref: '#/components/schemas/TeacherAssignmentStatus'
    StudentProfileStatusFilter:
      name: status
      in: query
      schema:
        $ref: '#/components/schemas/StudentProfileStatus'
    StudentProfileSearch:
      name: search
      in: query
      schema:
        type: string
        minLength: 1
        maxLength: 120
    StudentProfileSort:
      name: sort
      in: query
      description: Comma-separated field names; allowed values are full_name, registration_number, enrolled_at, status, and created_at. Prefix with '-' for descending.
      schema:
        type: string
    TenantContext:
      name: X-School-Id
      in: header
      required: false
      description: 'Explicit school tenant context for school-scoped requests. Required
        when the authenticated session is not already bound to exactly one active
        school.

        '
      schema:
        type: string
        format: uuid
    InvitationToken:
      name: invitationToken
      in: path
      required: true
      description: Opaque single-use invitation token value delivered out of band.
      schema:
        type: string
        minLength: 32
        maxLength: 255
  responses:
    Forbidden:
      description: The authenticated user lacks permission for this action
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    NotFound:
      description: Resource was not found in the permitted scope
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Conflict:
      description: Request conflicts with an existing identifier or incompatible lifecycle state
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    OutputExpired:
      description: Generated report output file has expired; request a new ReportRun
        with the same filters
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    TenantMismatch:
      description: Tenant context is missing, inactive, or outside permitted scope
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    AdministrationForbidden:
      description: Administration lifecycle access is forbidden because the tenant context is missing, inactive, or outside permitted scope, or because the authenticated user lacks the required platform or school administration permission.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          examples:
            tenantMismatch:
              summary: Tenant context is invalid for this school-scoped operation
              value:
                error:
                  code: tenant_mismatch
                  message: Tenant context is missing, inactive, or outside permitted scope.
            insufficientPermission:
              summary: Scope is valid but the actor lacks administration lifecycle permission
              value:
                error:
                  code: forbidden
                  message: The authenticated user lacks permission for this action.
    StudentProfileForbidden:
      description: Student profile access is forbidden because the tenant context is missing, inactive, or outside permitted scope, or because the authenticated user lacks student profile administration permission in an otherwise valid school context.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          examples:
            tenantMismatch:
              summary: Tenant context is invalid for this school-scoped operation
              value:
                error:
                  code: tenant_mismatch
                  message: Tenant context is missing, inactive, or outside permitted scope.
            insufficientPermission:
              summary: Tenant context is valid but the actor lacks student profile administration permission
              value:
                error:
                  code: forbidden
                  message: The authenticated user lacks permission for this action.
    TeacherWorkflowForbidden:
      description: Tenant context is missing, inactive, or outside permitted scope, or the authenticated user lacks the required teacher workflow permission.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    AccountLifecycleForbidden:
      description: Account lifecycle access is forbidden because tenant context is missing, inactive, or outside permitted scope, or because the actor lacks platform account administration or same-school user administration permission.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          examples:
            tenantMismatch:
              summary: Tenant context is invalid for a school-scoped account lifecycle operation
              value:
                error:
                  code: tenant_mismatch
                  message: Tenant context is missing, inactive, or outside permitted scope.
            insufficientPermission:
              summary: Actor lacks account lifecycle permission in an otherwise valid scope
              value:
                error:
                  code: forbidden
                  message: The authenticated user lacks permission for this action.
    ClassroomRosterForbidden:
      description: Classroom roster access is forbidden because tenant context is missing, inactive, or outside permitted scope, or because the authenticated actor lacks school-administrator permission or teacher own-active-assignment read permission in an otherwise valid school context.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          examples:
            tenantMismatch:
              summary: Tenant context is invalid for this school-scoped operation
              value:
                error:
                  code: tenant_mismatch
                  message: Tenant context is missing, inactive, or outside permitted scope.
            insufficientPermission:
              summary: Scope is valid but the actor lacks roster permission
              value:
                error:
                  code: forbidden
                  message: The authenticated user lacks permission for this action.
            teacherAssignmentDenied:
              summary: Teacher attempted to read another teacher's assignment
              value:
                error:
                  code: forbidden
                  message: Teachers may read only their own active assignments.
    AuthLockout:
      description: Login is locked after 5 failed attempts for either submitted email or source IP within 15 minutes
      headers:
        Retry-After:
          description: Seconds until another login attempt may be accepted.
          schema:
            type: integer
            minimum: 1
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    TokenRejected:
      description: Bearer token is expired, revoked, or tied to an inactive user or inactive school
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Unauthorized:
      description: Authentication is missing or invalid
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    TokenInvalid:
      description: Lifecycle token is expired, reused, superseded, revoked, malformed, missing, mismatched, or scope-incompatible
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    ValidationError:
      description: Validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
